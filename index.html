function toCSV(rows, cols) {
  const h = cols.map(c => c.label).join(",");
  const b = rows.map(r => cols.map(c => `"${(r[c.key] ?? "").toString().replace(/"/g, '""')}"`).join(",")).join("\n");
  return h + "\n" + b;
}
function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── EmailJS ───────────────────────────────────────────────────────────────────
async function sendNotifEmail(gestor, email, momento, resumen) {
  try { await emailjs.send(EJS_SERVICE, EJS_TEMPLATE, { gestor, email, momento, fecha: new Date().toLocaleDateString("es-ES"), resumen }, EJS_KEY); return true; }
  catch (e) { console.error(e); return false; }
}
function buildResumen(gestor, activities, clientName) {
  const actsPend = activities.filter(a => a.gestor === gestor && a.estado !== "Completada");
  const venc = actsPend.filter(a => diffDays(a.fecha) < 0);
  const hoy  = actsPend.filter(a => diffDays(a.fecha) === 0);
  const prox = actsPend.filter(a => diffDays(a.fecha) > 0 && diffDays(a.fecha) <= 3);
  let txt = "";
  if (venc.length) { txt += `🔴 VENCIDAS (${venc.length}):\n`; venc.forEach(a => txt += `  • ${a.titulo||a.nota?.slice(0,40)} — ${clientName(a.cliente_id)} — ${a.fecha}\n`); txt += "\n"; }
  if (hoy.length)  { txt += `🟠 HOY (${hoy.length}):\n`;       hoy.forEach(a  => txt += `  • ${a.titulo||a.nota?.slice(0,40)} — ${clientName(a.cliente_id)}\n`);              txt += "\n"; }
  if (prox.length) { txt += `🟡 PRÓXIMAS (${prox.length}):\n`; prox.forEach(a => txt += `  • ${a.titulo||a.nota?.slice(0,40)} — ${clientName(a.cliente_id)} — ${a.fecha}\n`); txt += "\n"; }
  if (!txt) txt = "✅ ¡Todo al día!\n";
  return txt;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [gestor, setGestor] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [usuarios, setUsuarios] = useState([]);
  useEffect(() => { sbGet("usuarios", "select=nombre&order=nombre.asc").then(r => setUsuarios(r.map(x => x.nombre))).catch(() => {}); }, []);
  async function handleLogin() {
    if (!gestor) { setError("Selecciona tu nombre"); return; }
    if (!pass)   { setError("Ingresa tu contraseña"); return; }
    setLoading(true);
    try {
      const rows = await sbGet("usuarios", `nombre=eq.${encodeURIComponent(gestor)}&select=nombre,password,admin,linea_negocio`);
      if (!rows.length || rows[0].password !== pass) { setError("Contraseña incorrecta"); setLoading(false); return; }
      const lineas = (rows[0].linea_negocio || "La Sin Gluten").split("|");
      const u = { nombre: rows[0].nombre, admin: rows[0].admin, lineas, lineaActiva: lineas[0] };
      sessionStorage.setItem("crm_session", JSON.stringify(u));
      onLogin(u);
    } catch { setError("Error de conexión"); }
    finally { setLoading(false); }
  }
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #8ecfd4 0%, #5bb5bc 100%)" }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: "2.5rem 2rem", width: "100%", maxWidth: 380, boxShadow: "0 20px 60px rgba(0,0,0,0.15)", animation: "slideIn 0.3s ease" }}>
        <div style={{ textAlign: "center", marginBottom: "2rem" }}>
          <div style={{ width: 90, height: 90, borderRadius: "50%", overflow: "hidden", margin: "0 auto 1rem", border: "3px solid #8ecfd4" }}>
            <img src="https://crm-lasingluten.github.io/crm-panificadora/Logo_02.png" alt="Logo" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          </div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>CRM Panificadora</div>
          <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>La Sin Gluten · Bauer Lemans</div>
        </div>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 12, color: "#666", marginBottom: 4 }}>Tu nombre</div>
          <Sel value={gestor} onChange={v => { setGestor(v); setError(""); }} options={usuarios} placeholder="Selecciona tu nombre" />
        </div>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 12, color: "#666", marginBottom: 4 }}>Contraseña</div>
          <input type="password" value={pass} onChange={e => { setPass(e.target.value); setError(""); }}
            onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Tu contraseña"
            style={{ padding: "7px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 13, width: "100%" }} />
        </div>
        {error && <div style={{ fontSize: 12, color: "#e24b4a", marginBottom: 12, textAlign: "center" }}>{error}</div>}
        <Btn variant="primary" onClick={handleLogin} disabled={loading} style={{ width: "100%", padding: "10px", fontSize: 14 }}>{loading ? "Verificando…" : "Entrar"}</Btn>
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel() {
  const [usuarios, setUsuarios] = useState([]);
  const [newPasses, setNewPasses] = useState({});
  const [emails, setEmails] = useState({});
  const [lineas, setLineas] = useState({});
  const [saved, setSaved] = useState({});
  useEffect(() => {
    sbGet("usuarios", "select=id,nombre,admin,email,linea_negocio&order=nombre.asc").then(rows => {
      setUsuarios(rows);
      const em = {}, ln = {};
      rows.forEach(r => { em[r.id] = r.email || ""; ln[r.id] = (r.linea_negocio || "La Sin Gluten").split("|"); });
      setEmails(em); setLineas(ln);
    }).catch(() => {});
  }, []);

  function toggleLinea(uid, linea) {
    const current = lineas[uid] || [];
    const updated = current.includes(linea) ? current.filter(l => l !== linea) : [...current, linea];
    if (updated.length === 0) return; // al menos una línea
    setLineas(l => ({ ...l, [uid]: updated }));
  }

  async function saveUser(u) {
    const np = newPasses[u.id]?.trim();
    const em = emails[u.id]?.trim();
    const ln = (lineas[u.id] || ["La Sin Gluten"]).join("|");
    const body = { linea_negocio: ln };
    if (np) { if (np.length < 4) { alert("Mínimo 4 caracteres"); return; } body.password = np; }
    if (em !== undefined) body.email = em;
    try {
      await sbPatch("usuarios", u.id, body);
      setNewPasses(p => ({ ...p, [u.id]: "" }));
      setSaved(s => ({ ...s, [u.id]: true }));
      setTimeout(() => setSaved(s => ({ ...s, [u.id]: false })), 2000);
    } catch (e) { alert("Error: " + e.message); }
  }

  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: "#555" }}>🔐 Gestión de usuarios</div>
      {usuarios.map(u => (
        <div key={u.id} style={{ marginBottom: 12, padding: "12px 14px", background: "#f9f9f9", borderRadius: 8, border: "1px solid #eee" }}>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 10 }}>{u.nombre} {u.admin && <Badge color="#185fa5" label="Admin" />}</div>
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 12, color: "#666", marginBottom: 6 }}>Líneas de negocio asignadas:</div>
            <div style={{ display: "flex", gap: 8 }}>
              {LINEAS.map(l => (
                <label key={l} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 13 }}>
                  <input type="checkbox" checked={(lineas[u.id] || []).includes(l)} onChange={() => toggleLinea(u.id, l)} />
                  <span style={{ color: LINEA_COLORS[l], fontWeight: 500 }}>{l}</span>
                </label>
              ))}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <input type="email" value={emails[u.id] || ""} onChange={e => setEmails(p => ({ ...p, [u.id]: e.target.value }))}
              placeholder="Email notificaciones" style={{ padding: "6px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 12, flex: 2, minWidth: 180 }} />
            <input type="password" value={newPasses[u.id] || ""} onChange={e => setNewPasses(p => ({ ...p, [u.id]: e.target.value }))}
              placeholder="Nueva contraseña" style={{ padding: "6px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 12, flex: 1, minWidth: 140 }} />
            <Btn variant="primary" onClick={() => saveUser(u)}>{saved[u.id] ? "✓ Guardado" : "Guardar"}</Btn>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── NOTIF CONFIG ──────────────────────────────────────────────────────────────
function NotifConfig({ activities, clients, currentUser }) {
  const clientName = id => clients.find(c => c.id === id)?.nombre || "—";
  const [cfg, setCfg] = useState(() => { try { return JSON.parse(localStorage.getItem("crm_notif") || '{"horaM":"08:00","horaT":"18:00","activo":true}'); } catch { return { horaM: "08:00", horaT: "18:00", activo: true }; } });
  const [sending, setSending] = useState(false);
  const [lastSent, setLastSent] = useState(() => { try { return JSON.parse(localStorage.getItem("crm_notif_last") || "{}"); } catch { return {}; } });
  const save = c => { setCfg(c); localStorage.setItem("crm_notif", JSON.stringify(c)); };

  async function sendAll(momento) {
    setSending(true);
    const usuarios = await sbGet("usuarios", "select=nombre,email");
    let ok = 0;
    for (const u of usuarios) {
      if (!u.email) continue;
      const res = buildResumen(u.nombre, activities, clientName);
      if (await sendNotifEmail(u.nombre, u.email, momento, res)) ok++;
    }
    const now = new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
    const updated = { ...lastSent, [momento]: now };
    setLastSent(updated); localStorage.setItem("crm_notif_last", JSON.stringify(updated));
    setSending(false); alert(`✅ Enviado a ${ok} gestor${ok !== 1 ? "es" : ""}`);
  }
  async function sendTest() {
    setSending(true);
    const rows = await sbGet("usuarios", `nombre=eq.${encodeURIComponent(currentUser.nombre)}&select=nombre,email`);
    const u = rows[0];
    if (!u?.email) { alert("No tienes email configurado."); setSending(false); return; }
    const res = buildResumen(u.nombre, activities, clientName);
    const ok = await sendNotifEmail(u.nombre, u.email, "prueba", res);
    setSending(false); alert(ok ? `✅ Email enviado a ${u.email}` : "❌ Error.");
  }
  useEffect(() => {
    if (!cfg.activo) return;
    const iv = setInterval(async () => {
      const now = new Date();
      const hhmm = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      const ds = now.toDateString();
      const stored = JSON.parse(localStorage.getItem("crm_notif_auto") || "{}");
      if (hhmm === cfg.horaM && stored.m !== ds) { localStorage.setItem("crm_notif_auto", JSON.stringify({ ...stored, m: ds })); await sendAll("inicio del día"); }
      if (hhmm === cfg.horaT && stored.t !== ds) { localStorage.setItem("crm_notif_auto", JSON.stringify({ ...stored, t: ds })); await sendAll("fin del día"); }
    }, 30000);
    return () => clearInterval(iv);
  }, [cfg, activities]);

  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: "#555" }}>📧 Notificaciones por email</div>
      <div style={{ background: "#f9f9f9", border: "1px solid #eee", borderRadius: 10, padding: "1rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          <span style={{ fontSize: 13, fontWeight: 500 }}>Automáticas</span>
          <label style={{ position: "relative", display: "inline-block", width: 44, height: 24, cursor: "pointer" }}>
            <input type="checkbox" checked={cfg.activo} onChange={e => save({ ...cfg, activo: e.target.checked })} style={{ opacity: 0, width: 0, height: 0 }} />
            <span style={{ position: "absolute", inset: 0, borderRadius: 24, background: cfg.activo ? "#185fa5" : "#ccc", transition: "0.3s" }}>
              <span style={{ position: "absolute", top: 3, left: cfg.activo ? 22 : 3, width: 18, height: 18, borderRadius: "50%", background: "#fff", transition: "0.3s" }} />
            </span>
          </label>
          <span style={{ fontSize: 12, color: cfg.activo ? "#1d9e75" : "#aaa" }}>{cfg.activo ? "Activadas" : "Desactivadas"}</span>
        </div>
        <div style={{ display: "flex", gap: 16, marginBottom: 12, flexWrap: "wrap" }}>
          {[["🌅 Mañana", "horaM", "inicio del día"], ["🌆 Tarde", "horaT", "fin del día"]].map(([l, k, mk]) => (
            <div key={k} style={{ flex: 1, minWidth: 140 }}>
              <div style={{ fontSize: 12, color: "#666", marginBottom: 4 }}>{l}</div>
              <input type="time" value={cfg[k]} onChange={e => save({ ...cfg, [k]: e.target.value })}
                style={{ padding: "7px 10px", border: "1px solid #ddd", borderRadius: 8, fontSize: 13, width: "100%" }} />
              {lastSent[mk] && <div style={{ fontSize: 11, color: "#aaa", marginTop: 3 }}>Último: {lastSent[mk]}</div>}
            </div>
          ))}
        </div>
        <div style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>⚠️ Requiere que el CRM esté abierto en el navegador.</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Btn variant="primary" onClick={sendTest} disabled={sending}>📧 Prueba (solo a mí)</Btn>
          <Btn variant="success" onClick={() => sendAll("inicio del día")} disabled={sending}>🌅 Enviar mañana</Btn>
          <Btn variant="success" onClick={() => sendAll("fin del día")} disabled={sending}>🌆 Enviar tarde</Btn>
        </div>
      </div>
    </div>
  );
}

// ── NOTIF BANNER ──────────────────────────────────────────────────────────────
function NotifBanner({ activities, clients, filterGestor }) {
  const clientName = id => clients.find(c => c.id === id)?.nombre || "—";
  const alertas = useMemo(() => activities
    .filter(a => a.estado !== "Completada" && (!filterGestor || a.gestor === filterGestor))
    .map(a => {
      const d = diffDays(a.fecha);
      if (d < 0)  return { ...a, tipo: "vencida", label: `Vencida hace ${Math.abs(d)}d` };
      if (d === 0) return { ...a, tipo: "hoy", label: "Vence hoy" };
      if (d <= 3)  return { ...a, tipo: "proxima", label: `Vence en ${d}d` };
      return null;
    }).filter(Boolean).sort((a, b) => a.fecha.localeCompare(b.fecha)),
  [activities, filterGestor]);
  const [visible, setVisible] = useState(true);
  useEffect(() => setVisible(true), [filterGestor]);
  if (!alertas.length || !visible) return null;
  const isV = alertas.some(a => a.tipo === "vencida"), isH = alertas.some(a => a.tipo === "hoy");
  return (
    <div style={{ background: isV ? "#fef2f2" : isH ? "#fff7ed" : "#fffbeb", border: `1px solid ${isV ? "#fca5a5" : isH ? "#fed7aa" : "#fde68a"}`, borderRadius: 10, padding: "0.75rem 1rem", marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between" }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{isV ? "🔴" : isH ? "🟠" : "🟡"} {alertas.length} actividad{alertas.length !== 1 ? "es" : ""} requieren atención</div>
          {alertas.slice(0, 3).map(a => (
            <div key={a.id} style={{ fontSize: 12, color: "#555", marginBottom: 3, display: "flex", gap: 8 }}>
              <Badge color={isV ? "#e24b4a" : isH ? "#ba7517" : "#d97706"} label={a.label} />
              <span>{a.titulo || a.nota?.slice(0,40)} — {clientName(a.cliente_id)} · <strong>{a.gestor}</strong></span>
            </div>
          ))}
          {alertas.length > 3 && <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>…y {alertas.length - 3} más</div>}
        </div>
        <button onClick={() => setVisible(false)} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 18, marginLeft: 12 }}>×</button>
      </div>
    </div>
  );
}

// ── IMPORTACIÓN EXCEL CLIENTES ────────────────────────────────────────────────
function ImportExcel({ config, clients, onImport, onClose, lineaActiva }) {
  const [preview, setPreview] = useState(null);
  const [importing, setImporting] = useState(false);
  const [result, setResult] = useState(null);
  const fileRef = useRef();
  function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
        const mapped = rows.map(r => {
          const keys = Object.keys(r);
          const get = (idx, names) => { for (const n of names) { const k = keys.find(k => k.toLowerCase().includes(n.toLowerCase())); if (k !== undefined) return String(r[k] || "").trim(); } return String(r[keys[idx]] || "").trim(); };
          return { nombre: get(0,["nombre","empresa"]), nif: get(1,["nif","cif"]), calle: get(2,["calle"]), numero: get(3,["numero","número"]), cp: get(4,["cp","postal"]), ciudad: get(5,["ciudad"]), pais: get(6,["pais","país"]) || "España", telefono: get(7,["telefono","teléfono"]), email: get(8,["email","mail"]), contacto: get(9,["contacto"]), canal: get(10,["canal"]), grupo: get(11,["grupo"]), gestor: get(12,["gestor"]), tipo_cliente: get(13,["tipo"]) || "Potencial", comentarios: get(14,["comentarios","comentario","notas"]), linea_negocio: get(15,["linea","línea"]) || lineaActiva };
        }).filter(r => r.nombre);
        setPreview(mapped); setResult(null);
      } catch (err) { alert("Error: " + err.message); }
    };
    reader.readAsBinaryString(file);
  }
  async function handleImport() {
    if (!preview?.length) return;
    setImporting(true);
    let ok = 0, skip = 0, err = 0;
    for (const row of preview) {
      const existe = clients.some(c => (row.nif && normalize(c.nif) === normalize(row.nif)) || normalize(c.nombre) === normalize(row.nombre));
      if (existe) { skip++; continue; }
      try { await sbPost("clientes", row); ok++; } catch { err++; }
    }
    setImporting(false); setResult({ ok, skip, err });
    if (ok > 0) onImport();
  }
  function downloadTemplate() {
    const ws = XLSX.utils.aoa_to_sheet([
      ["Nombre empresa","NIF","Calle","Número","CP","Ciudad","País","Teléfono","Email","Contacto","Canal","Grupo","Gestor","Tipo(Potencial/Cliente/Inactivo)","Comentarios","Línea de negocio"],
      ["Ejemplo SL","B12345678","Calle Mayor","1","08001","Barcelona","España","34612345678","info@ejemplo.com","Juan García","Digital","Norte","Rodrigo","Potencial","Cliente interesante","La Sin Gluten"]
    ]);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Clientes"); XLSX.writeFile(wb, "plantilla_clientes.xlsx");
  }
  return (
    <Card>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontSize: 15, fontWeight: 600 }}>📥 Importar clientes</span>
        <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#888" }}>×</button>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <Btn variant="success" onClick={downloadTemplate}>⬇ Plantilla</Btn>
        <Btn variant="primary" onClick={() => { fileRef.current.value = ""; fileRef.current.click(); }}>📂 Seleccionar archivo</Btn>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{ display: "none" }} />
      </div>
      {preview && (
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Vista previa — {preview.length} clientes</div>
          <div style={{ overflowX: "auto", maxHeight: 200, overflowY: "auto", marginBottom: 12, border: "1px solid #eee", borderRadius: 8 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead style={{ background: "#f9f9f9", position: "sticky", top: 0 }}>
                <tr>{["Empresa","NIF","Ciudad","Gestor","Tipo","Línea"].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontWeight: 600, color: "#555", borderBottom: "1px solid #eee" }}>{h}</th>)}</tr>
              </thead>
              <tbody>{preview.map((r, i) => <tr key={i} style={{ borderBottom: "1px solid #f5f5f5" }}>
                <td style={{ padding: "5px 8px", fontWeight: 500 }}>{r.nombre}</td>
                <td style={{ padding: "5px 8px", color: "#888" }}>{r.nif||"—"}</td>
                <td style={{ padding: "5px 8px", color: "#888" }}>{r.ciudad||"—"}</td>
                <td style={{ padding: "5px 8px" }}>{r.gestor||"—"}</td>
                <td style={{ padding: "5px 8px" }}><Badge color={r.tipo_cliente==="Cliente"?"#1d9e75":r.tipo_cliente==="Inactivo"?"#888":"#ba7517"} label={r.tipo_cliente||"Potencial"} /></td>
                <td style={{ padding: "5px 8px" }}><Badge color={LINEA_COLORS[r.linea_negocio]||"#888"} label={r.linea_negocio||lineaActiva} /></td>
              </tr>)}</tbody>
            </table>
          </div>
          {result ? <div style={{ padding: "10px 14px", background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, fontSize: 13 }}>✅ <strong>{result.ok}</strong> importados · <strong>{result.skip}</strong> omitidos · <strong>{result.err}</strong> errores</div>
          : <Btn variant="primary" onClick={handleImport} disabled={importing} style={{ width: "100%" }}>{importing ? "Importando…" : `Importar ${preview.length} clientes`}</Btn>}
        </div>
      )}
    </Card>
  );
}

// ── IMPORTACIÓN VENTAS ────────────────────────────────────────────────────────
function ImportVentas({ clients, onImport, onClose }) {
  const [preview, setPreview] = useState(null);
  const [importing, setImporting] = useState(false);
  const [result, setResult] = useState(null);
  const [delMes, setDelMes] = useState(String(currMonth));
  const [delAnio, setDelAnio] = useState(String(currYear));
  const [deleting, setDeleting] = useState(false);
  const fileRef = useRef();

  async function borrarMes() {
    if (!confirm(`¿Borrar TODAS las ventas de ${MESES[parseInt(delMes)-1]} ${delAnio}?`)) return;
    setDeleting(true);
    try { await sbDeleteWhere("ventas", `mes=eq.${delMes}&anio=eq.${delAnio}`); alert(`✅ Ventas de ${MESES[parseInt(delMes)-1]} ${delAnio} eliminadas.`); onImport(); }
    catch (e) { alert("Error: " + e.message); }
    finally { setDeleting(false); }
  }

  function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
        const mapped = rows.map(r => {
          const keys = Object.keys(r);
          const get = (idx, names) => { for (const n of names) { const k = keys.find(k => k.toLowerCase().includes(n.toLowerCase())); if (k !== undefined) return r[k]; } return r[keys[idx]]; };
          const codCliente = String(get(0,["codigo cliente","código cliente"]) || "").trim();
          const cliente = clients.find(c => c.codigo === codCliente);
          return { codigo_cliente: codCliente, cliente_id: cliente?.id || null, cliente_nombre: cliente?.nombre || codCliente, codigo_producto: String(get(1,["codigo producto","código producto"]) || "").trim(), denominacion: String(get(2,["denominacion","denominación","producto"]) || "").trim(), unidades: parseFloat(get(3,["unidades","cantidad"]) || 0), precio_unidad: parseFloat(get(4,["precio","precio unidad"]) || 0), venta_neta: parseFloat(get(5,["venta neta","venta_neta","importe"]) || 0), mes: parseInt(get(6,["mes","month"]) || currMonth), anio: parseInt(get(7,["año","anio","year"]) || currYear), gestor: cliente?.gestor || "", linea_negocio: cliente?.linea_negocio || "La Sin Gluten" };
        }).filter(r => r.codigo_cliente || r.denominacion);
        setPreview(mapped); setResult(null);
      } catch (err) { alert("Error: " + err.message); }
    };
    reader.readAsBinaryString(file);
  }
  async function handleImport() {
    if (!preview?.length) return;
    setImporting(true);
    let ok = 0, err = 0;
    for (const row of preview) {
      try { await sbPost("ventas", { cliente_id: row.cliente_id, codigo_cliente: row.codigo_cliente, codigo_producto: row.codigo_producto, denominacion: row.denominacion, unidades: row.unidades, precio_unidad: row.precio_unidad, venta_neta: row.venta_neta, mes: row.mes, anio: row.anio, gestor: row.gestor, linea_negocio: row.linea_negocio }); ok++; }
      catch { err++; }
    }
    setImporting(false); setResult({ ok, err });
    if (ok > 0) onImport();
  }
  function downloadTemplate() {
    const ws = XLSX.utils.aoa_to_sheet([["Código Cliente","Código Producto","Denominación Producto","Unidades","Precio por Unidad","Venta Neta","Mes","Año"],["CL000001","PROD001","Pan Sin Gluten 500g","100","3.50","350","4","2026"]]);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Ventas"); XLSX.writeFile(wb, "plantilla_ventas.xlsx");
  }
  return (
    <Card>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontSize: 15, fontWeight: 600 }}>📊 Importar / Gestionar ventas</span>
        <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#888" }}>×</button>
      </div>
      <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 10, padding: "1rem", marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#b91c1c", marginBottom: 10 }}>🗑️ Borrar ventas de un mes/año</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 120 }}><Sel value={delMes} onChange={setDelMes} options={MESES.map((_,i) => String(i+1))} /></div>
          <div style={{ flex: 1, minWidth: 100 }}><Sel value={delAnio} onChange={setDelAnio} options={ANIOS} /></div>
          <Btn variant="danger" onClick={borrarMes} disabled={deleting}>{deleting ? "Borrando…" : "Borrar mes"}</Btn>
        </div>
        <div style={{ fontSize: 11, color: "#888", marginTop: 8 }}>Usa esto antes de reimportar un mes corregido.</div>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <Btn variant="success" onClick={downloadTemplate}>⬇ Plantilla</Btn>
        <Btn variant="primary" onClick={() => { fileRef.current.value = ""; fileRef.current.click(); }}>📂 Seleccionar archivo</Btn>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{ display: "none" }} />
      </div>
      {preview && (
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Vista previa — {preview.length} líneas</div>
          <div style={{ overflowX: "auto", maxHeight: 200, overflowY: "auto", marginBottom: 12, border: "1px solid #eee", borderRadius: 8 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead style={{ background: "#f9f9f9", position: "sticky", top: 0 }}>
                <tr>{["Cód.Cliente","Cliente","Producto","Uds","Venta Neta","Mes/Año"].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontWeight: 600, color: "#555", borderBottom: "1px solid #eee" }}>{h}</th>)}</tr>
              </thead>
              <tbody>{preview.map((r, i) => <tr key={i} style={{ borderBottom: "1px solid #f5f5f5" }}>
                <td style={{ padding: "5px 8px", fontFamily: "monospace", fontSize: 11 }}>{r.codigo_cliente}</td>
                <td style={{ padding: "5px 8px", fontWeight: 500 }}>{r.cliente_nombre}</td>
                <td style={{ padding: "5px 8px" }}>{r.denominacion}</td>
                <td style={{ padding: "5px 8px", textAlign: "right" }}>{r.unidades}</td>
                <td style={{ padding: "5px 8px", textAlign: "right", fontWeight: 600, color: "#1d9e75" }}>€{r.venta_neta?.toFixed(2)}</td>
                <td style={{ padding: "5px 8px", color: "#888" }}>{MESES[(r.mes||1)-1]?.slice(0,3)} {r.anio}</td>
              </tr>)}</tbody>
            </table>
          </div>
          {result ? <div style={{ padding: "10px 14px", background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, fontSize: 13 }}>✅ <strong>{result.ok}</strong> importadas · <strong>{result.err}</strong> errores</div>
          : <Btn variant="primary" onClick={handleImport} disabled={importing} style={{ width: "100%" }}>{importing ? "Importando…" : `Importar ${preview.length} líneas`}</Btn>}
        </div>
      )}
    </Card>
  );
}

// ── GRÁFICO ───────────────────────────────────────────────────────────────────
function VentasChart({ data }) {
  const canvasRef = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (!data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = [...new Set(data.map(d => d.label))];
    const totals = labels.map(l => data.filter(d => d.label === l).reduce((s, d) => s + (d.venta_neta || 0), 0));
    chartRef.current = new Chart(canvasRef.current, {
      type: "bar",
      data: { labels, datasets: [{ label: "Venta Neta (€)", data: totals, backgroundColor: "#8ecfd488", borderColor: "#5bb5bc", borderWidth: 2, borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `€ ${ctx.raw.toLocaleString("es-ES", { minimumFractionDigits: 2 })}` } } }, scales: { y: { ticks: { callback: v => `€${v.toLocaleString("es-ES")}` } } } }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);
  if (!data.length) return <div style={{ textAlign: "center", color: "#aaa", padding: "2rem", fontSize: 13 }}>Sin datos.</div>;
  return <div style={{ height: 280, position: "relative" }}><canvas ref={canvasRef} /></div>;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function CRM() {

  const loadAll = useCallback(async () => {

      setConfigState(cfg); setClients(cls); setActivities(acts); setVentas(vts);
    } catch (e) { setError("No se pudo conectar. " + e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { if (currentUser) loadAll(); }, [currentUser, loadAll]);

  useEffect(() => {
    if (currentUser && config.gestores.includes(currentUser.nombre)) {
      setDashGestor(currentUser.nombre);
      setActFiltro(f => ({ ...f, gestor: currentUser.nombre }));
      setVentasFiltro(f => ({ ...f, gestor: currentUser.nombre }));

  }, [currentUser, config.gestores]);

  }

  async function saveConfig(key, arr) {
    const rows = await sbGet("config", `clave=eq.${key}&select=id`);
    if (rows.length) await sbPatch("config", rows[0].id, { valor: arr });
    else await sbPost("config", { clave: key, valor: arr });
    setConfigState(prev => ({ ...prev, [key]: arr }));
  }
  async function saveClient(form) {
    setSaving(true);
    try {
      const body = { nombre: form.nombre, nif: form.nif, calle: form.calle, numero: form.numero, cp: form.cp, ciudad: form.ciudad, pais: form.pais, telefono: form.telefono, email: form.email, contacto: form.contacto, canal: form.canal, grupo: form.grupo, gestor: form.gestor, tipo_cliente: form.tipo_cliente || "Potencial", comentarios: form.comentarios || "", linea_negocio: form.linea_negocio || lineaActiva };
      if (form.id) { await sbPatch("clientes", form.id, body); }
      else {
        const allCodes = clients.map(c => c.codigo).filter(Boolean);
        const maxNum = allCodes.length ? Math.max(...allCodes.map(c => parseInt(c.replace("CL","")) || 0)) : 0;
        body.codigo = "CL" + String(maxNum + 1).padStart(6, "0");
        await sbPost("clientes", body);
      }
      await loadAll(); setClientPanel(null);
    } catch (e) { alert("Error: " + e.message); }
    finally { setSaving(false); }
  }
  async function deleteClient(id) {
    if (!confirm("¿Eliminar este cliente?")) return;
    try { await sbDelete("clientes", id); await loadAll(); setDetalleId(null); }
    catch (e) { alert("Error: " + e.message); }
  }
  async function saveActivity(form) {
    setSaving(true);
    try {
      const body = { cliente_id: form.clienteId, tipo: form.tipo, titulo: form.titulo || "", nota: form.nota, fecha: form.fecha, gestor: form.gestor, estado: form.estado || "Pendiente", prioridad: form.prioridad || "Media", linea_negocio: form.linea_negocio || lineaActiva };
      if (form.id) await sbPatch("actividades", form.id, body);
      else await sbPost("actividades", body);
      await loadAll(); setActPanel(null);
    } catch (e) { alert("Error: " + e.message); }
    finally { setSaving(false); }
  }
  async function deleteActivity(id) {
    try { await sbDelete("actividades", id); setActivities(p => p.filter(a => a.id !== id)); }
    catch (e) { alert("Error: " + e.message); }
  }

  const filteredClients = useMemo(() => clientsFiltLinea.filter(c =>
    (!filter.canal || c.canal === filter.canal) &&
    (!filter.grupo || c.grupo === filter.grupo) &&
    (!filter.gestor || c.gestor === filter.gestor) &&
    (!filter.tipo_cliente || c.tipo_cliente === filter.tipo_cliente)
  ), [clientsFiltLinea, filter]);

  const ventasFilt = useMemo(() => ventasFiltLinea.filter(v => {
    const cliente = clients.find(c => c.id === v.cliente_id);
    if (ventasFiltro.canal && cliente?.canal !== ventasFiltro.canal) return false;
    if (ventasFiltro.grupo && cliente?.grupo !== ventasFiltro.grupo) return false;
    if (ventasFiltro.gestor && v.gestor !== ventasFiltro.gestor) return false;
    if (ventasFiltro.mes && String(v.mes) !== ventasFiltro.mes) return false;
    if (ventasFiltro.anio && String(v.anio) !== ventasFiltro.anio) return false;

                <td style={{padding:"9px 10px",color:"#888",fontSize:12}}>{c.nif}</td>
                <td style={{padding:"9px 10px",fontSize:12,color:"#666"}}>{c.ciudad}</td>
                <td style={{padding:"9px 10px",fontSize:12}}>{c.telefono?<span>{c.telefono} <a href={`tel:${c.telefono}`} style={{textDecoration:"none"}}>📞</a> <a href={`https://wa.me/${c.telefono.replace(/[\s+\-()]/g,"")}`} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>💬</a></span>:"—"}</td>
                <td style={{padding:"9px 10px",fontSize:12}}>{c.email?<a href={`mailto:${c.email}`} style={{color:linColor,textDecoration:"none"}}>✉️ {c.email}</a>:"—"}</td>
                <td style={{padding:"9px 10px"}}><Badge color={c.tipo_cliente==="Cliente"?"#1d9e75":c.tipo_cliente==="Inactivo"?"#888":"#ba7517"} label={c.tipo_cliente||"Potencial"} /></td>
                <td style={{padding:"9px 10px",fontSize:12}}>{c.gestor}</td>
                <td style={{padding:"9px 10px"}}><div style={{display:"flex",gap:6}}><Btn onClick={()=>{setDetalleId(null);setClientPanel(c);}}>Editar</Btn><Btn onClick={()=>deleteClient(c.id)} style={{color:"#e24b4a",borderColor:"#fca5a5"}}>Borrar</Btn></div></td>
              </tr>
            ))}</tbody>
          </table>
          {filteredClients.length===0&&<div style={{textAlign:"center",color:"#aaa",marginTop:24,fontSize:13}}>Sin clientes.</div>}
        </div>
      </>}
    </div>;
  }

  function TabActividades() {
    const actsFilt = activitiesFiltLinea.filter(a =>
      (!actFiltro.gestor || a.gestor === actFiltro.gestor) &&
      (!actFiltro.estado || a.estado === actFiltro.estado) &&
      (!actFiltro.tipo   || a.tipo   === actFiltro.tipo)
    );
    return <div>
      {actPanel!==null && <ActividadForm initial={actPanel==="new"?{}:{...actPanel,clienteId:actPanel.cliente_id}} config={config} clients={clientsFiltLinea} onSave={saveActivity} onCancel={()=>setActPanel(null)} saving={saving} currentUser={currentUser} lineaActiva={lineaActiva} />}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <Sel value={actFiltro.gestor} onChange={v=>setActFiltro(f=>({...f,gestor:v}))} options={config.gestores} placeholder="Todos los gestores" />
        <Sel value={actFiltro.estado} onChange={v=>setActFiltro(f=>({...f,estado:v}))} options={ESTADOS_ACT} placeholder="Todos los estados" />
        <Sel value={actFiltro.tipo}   onChange={v=>setActFiltro(f=>({...f,tipo:v}))}   options={TIPOS}       placeholder="Todos los tipos" />
        {(actFiltro.gestor||actFiltro.estado||actFiltro.tipo)&&<Btn onClick={()=>setActFiltro({gestor:currentUser.nombre,estado:"",tipo:""})}>Limpiar</Btn>}
        <Btn variant="primary" onClick={()=>setActPanel("new")} style={{marginLeft:"auto"}}>+ Nueva actividad</Btn>
      </div>
      {actsFilt.map(a=>{
        const d=diffDays(a.fecha);
        const alerta=a.estado!=="Completada"&&(d<0?"#fef2f2":d===0?"#fff7ed":d<=3?"#fffbeb":null);
        return(
          <div key={a.id} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"12px 10px",marginBottom:4,borderRadius:8,background:alerta||"#fff",border:`1px solid ${alerta?(d<0?"#fca5a5":d===0?"#fed7aa":"#fde68a"):"#f0f0f0"}`}}>
            <Badge color={tipoColor[a.tipo]} label={a.tipo} />
            <Badge color={estadoColor[a.estado||"Pendiente"]} label={a.estado||"Pendiente"} />
            <div style={{flex:1}}>
              {a.titulo&&<div style={{fontSize:13,fontWeight:600}}>{a.titulo}</div>}
              <div style={{fontSize:13,fontWeight:500}}>{clientName(a.cliente_id)}</div>
              <div style={{fontSize:12,color:"#555",marginTop:2}}>{a.nota}</div>
              <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{a.fecha} · <strong>{a.gestor}</strong> · <Badge color={prioColor[a.prioridad||"Media"]} label={a.prioridad||"Media"} /></div>
            </div>
            <Btn onClick={()=>setActPanel(a)}>Editar</Btn>
            <Btn onClick={()=>deleteActivity(a.id)} style={{color:"#e24b4a",borderColor:"#fca5a5"}}>Borrar</Btn>
          </div>
        );
      })}
      {actsFilt.length===0&&<div style={{textAlign:"center",color:"#aaa",marginTop:24,fontSize:13}}>Sin actividades.</div>}
    </div>;
  }

  function TabVentas() {
    const totalVenta = ventasFilt.reduce((s,v)=>s+(v.venta_neta||0),0);
    const totalUds   = ventasFilt.reduce((s,v)=>s+(v.unidades||0),0);
    return <div>
      {showImportVen&&<ImportVentas clients={clients} onImport={async()=>{await loadAll();setShowImportVen(false);}} onClose={()=>setShowImportVen(false)} />}
      {!showImportVen&&<>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"flex-end"}}>
          {[["Canal","canal",config.canales],["Gestor","gestor",config.gestores],["Grupo","grupo",config.grupos]].map(([l,k,opts])=>(
            <div key={k} style={{flex:"1 1 120px"}}>
              <div style={{fontSize:11,color:"#888",marginBottom:3}}>{l}</div>
              <Sel value={ventasFiltro[k]} onChange={v=>setVentasFiltro(f=>({...f,[k]:v}))} options={opts} placeholder="Todos" />
            </div>
          ))}
          <div style={{flex:"1 1 100px"}}>
            <div style={{fontSize:11,color:"#888",marginBottom:3}}>Mes</div>
            <Sel value={ventasFiltro.mes} onChange={v=>setVentasFiltro(f=>({...f,mes:v}))} options={MESES.map((_,i)=>String(i+1))} placeholder="Todos" />
          </div>
          <div style={{flex:"1 1 100px"}}>
            <div style={{fontSize:11,color:"#888",marginBottom:3}}>Año</div>
            <Sel value={ventasFiltro.anio} onChange={v=>setVentasFiltro(f=>({...f,anio:v}))} options={["", ...ANIOS]} placeholder="Todos" />
          </div>
          <div style={{flex:"1 1 120px"}}>
            <div style={{fontSize:11,color:"#888",marginBottom:3}}>Agrupar gráfico</div>
            <Sel value={ventasFiltro.groupBy} onChange={v=>setVentasFiltro(f=>({...f,groupBy:v}))} options={["mes","gestor","canal","cliente"]} />
          </div>
          <Btn onClick={()=>setVentasFiltro({canal:"",gestor:currentUser.nombre,grupo:"",mes:"",anio:String(currYear),groupBy:"mes"})}>Limpiar</Btn>
          <Btn variant="warning" onClick={()=>setShowImportVen(true)}>📥 Importar/Borrar</Btn>
          <Btn variant="success" onClick={()=>downloadCSV(toCSV(ventasFilt.map(v=>({...v,cliente:clientName(v.cliente_id),mes_nombre:MESES[(v.mes||1)-1]})),[
            {key:"cliente",label:"Cliente"},{key:"codigo_cliente",label:"Cód.Cliente"},{key:"codigo_producto",label:"Cód.Producto"},
            {key:"denominacion",label:"Producto"},{key:"unidades",label:"Unidades"},{key:"precio_unidad",label:"Precio Unidad"},
            {key:"venta_neta",label:"Venta Neta"},{key:"mes_nombre",label:"Mes"},{key:"anio",label:"Año"},{key:"gestor",label:"Gestor"}
          ]),"ventas.csv")}>⬇ CSV</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
          {[["Venta neta total",`€${totalVenta.toLocaleString("es-ES",{minimumFractionDigits:2})}`,"#185fa5"],["Total unidades",totalUds.toLocaleString("es-ES"),"#1d9e75"],["Líneas",ventasFilt.length,"#7f77dd"]].map(([l,v,c])=>(
            <div key={l} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:10,padding:"1rem",textAlign:"center"}}>
              <div style={{fontSize:12,color:"#888",marginBottom:4}}>{l}</div>
              <div style={{fontSize:typeof v==="string"&&v.startsWith("€")?18:22,fontWeight:600,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        <Card><VentasChart data={ventasChart} /></Card>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,background:"#fff",borderRadius:10}}>
            <thead style={{background:"#f9f9f9"}}>
              <tr>{["Cliente","Cód.Cliente","Producto","Uds","P.Unit","Venta Neta","Mes","Año","Gestor"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 10px",fontWeight:600,color:"#555",fontSize:12,borderBottom:"1px solid #eee",whiteSpace:"nowrap"}}>{h}</th>)}</tr>
            </thead>
            <tbody>{ventasFilt.map(v=>(
              <tr key={v.id} style={{borderBottom:"1px solid #f0f0f0"}}>
                <td style={{padding:"8px 10px",fontWeight:500}}>{clientName(v.cliente_id)}</td>
                <td style={{padding:"8px 10px",fontSize:11,fontFamily:"monospace",color:linColor}}>{v.codigo_cliente}</td>
                <td style={{padding:"8px 10px",fontSize:12}}>{v.denominacion}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:12}}>{v.unidades}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontSize:12}}>€{parseFloat(v.precio_unidad||0).toFixed(2)}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontWeight:600,color:"#1d9e75"}}>€{parseFloat(v.venta_neta||0).toLocaleString("es-ES",{minimumFractionDigits:2})}</td>
                <td style={{padding:"8px 10px",fontSize:12}}>{MESES[(v.mes||1)-1]}</td>
                <td style={{padding:"8px 10px",fontSize:12}}>{v.anio}</td>
                <td style={{padding:"8px 10px",fontSize:12}}>{v.gestor}</td>
              </tr>
            ))}</tbody>
          </table>
          {ventasFilt.length===0&&<div style={{textAlign:"center",color:"#aaa",marginTop:24,fontSize:13}}>Sin datos de ventas.</div>}
        </div>
      </>}
    </div>;
  }

  function TabInformes() {
    const [rptFilter, setRptFilter] = useState({ canal:"", grupo:"", gestor:"", fechaDesde:"", fechaHasta:"", estado:"" });
    const fc = clientsFiltLinea.filter(c=>(!rptFilter.canal||c.canal===rptFilter.canal)&&(!rptFilter.grupo||c.grupo===rptFilter.grupo)&&(!rptFilter.gestor||c.gestor===rptFilter.gestor));
    const rows = fc.map(c=>{
      const cActs=activitiesFiltLinea.filter(a=>a.cliente_id===c.id&&(!rptFilter.fechaDesde||a.fecha>=rptFilter.fechaDesde)&&(!rptFilter.fechaHasta||a.fecha<=rptFilter.fechaHasta)&&(!rptFilter.estado||a.estado===rptFilter.estado));
      const ultima=cActs.length?cActs[0].fecha:"—";
      const ventaCliente=ventasFiltLinea.filter(v=>v.cliente_id===c.id).reduce((s,v)=>s+(v.venta_neta||0),0);
      return {...c,numActs:cActs.length,ultima,actsPend:activitiesFiltLinea.filter(a=>a.cliente_id===c.id&&a.estado!=="Completada").length,ventaTotal:ventaCliente};
    });
    return <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"flex-end"}}>
        {[["Canal","canal",config.canales],["Grupo","grupo",config.grupos],["Gestor","gestor",config.gestores],["Estado activ.","estado",ESTADOS_ACT]].map(([l,k,opts])=>(
          <div key={k} style={{flex:"1 1 120px"}}>
            <div style={{fontSize:11,color:"#888",marginBottom:3}}>{l}</div>
            <Sel value={rptFilter[k]} onChange={v=>setRptFilter(f=>({...f,[k]:v}))} options={opts} placeholder="Todos" />
          </div>
        ))}
        {[["fechaDesde","Activ. desde"],["fechaHasta","Activ. hasta"]].map(([k,l])=>(
          <div key={k} style={{flex:"1 1 120px"}}>
            <div style={{fontSize:11,color:"#888",marginBottom:3}}>{l}</div>
            <Inp type="date" value={rptFilter[k]} onChange={v=>setRptFilter(f=>({...f,[k]:v}))} />
          </div>
        ))}
        <Btn onClick={()=>setRptFilter({canal:"",grupo:"",gestor:"",fechaDesde:"",fechaHasta:"",estado:""})}>Limpiar</Btn>
        <Btn variant="success" onClick={()=>downloadCSV(toCSV(rows,[
          {key:"codigo",label:"Código"},{key:"nombre",label:"Empresa"},{key:"tipo_cliente",label:"Tipo"},
          {key:"canal",label:"Canal"},{key:"grupo",label:"Grupo"},{key:"gestor",label:"Gestor"},
          {key:"numActs",label:"Actividades"},{key:"actsPend",label:"Pendientes"},{key:"ultima",label:"Última activ."},
          {key:"ventaTotal",label:"Venta Total €"}
        ]),"informe.csv")}>⬇ CSV</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {[["Clientes",rows.length,"#185fa5"],["Actividades",rows.reduce((s,r)=>s+r.numActs,0),"#1d9e75"],["Pendientes",rows.reduce((s,r)=>s+r.actsPend,0),"#ba7517"],[`Venta Total`,`€${rows.reduce((s,r)=>s+r.ventaTotal,0).toLocaleString("es-ES",{minimumFractionDigits:2})}`,"#7f77dd"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:8,padding:"0.75rem 1rem"}}>
            <div style={{fontSize:11,color:"#888",marginBottom:2}}>{l}</div>
            <div style={{fontSize:typeof v==="string"&&v.startsWith("€")?15:22,fontWeight:600,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,background:"#fff",borderRadius:10}}>
          <thead style={{background:"#f9f9f9"}}>
            <tr>{["Código","Empresa","Tipo","Canal","Gestor","Actividades","Pendientes","Última activ.","Venta Total"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 10px",fontWeight:600,color:"#555",fontSize:12,borderBottom:"1px solid #eee",whiteSpace:"nowrap"}}>{h}</th>)}</tr>
          </thead>
          <tbody>{rows.map(r=>(
            <tr key={r.id} style={{borderBottom:"1px solid #f0f0f0"}}>
              <td style={{padding:"9px 10px",fontSize:11,fontFamily:"monospace",color:linColor,fontWeight:600}}>{r.codigo||"—"}</td>
              <td style={{padding:"9px 10px",fontWeight:500}}>{r.nombre}</td>
              <td style={{padding:"9px 10px"}}><Badge color={r.tipo_cliente==="Cliente"?"#1d9e75":r.tipo_cliente==="Inactivo"?"#888":"#ba7517"} label={r.tipo_cliente||"Potencial"} /></td>
              <td style={{padding:"9px 10px"}}><Badge color="#7f77dd" label={r.canal||"—"} /></td>
              <td style={{padding:"9px 10px",fontSize:12}}>{r.gestor}</td>
              <td style={{padding:"9px 10px",textAlign:"center",color:r.numActs>0?"#1d9e75":"#aaa",fontWeight:600}}>{r.numActs}</td>
              <td style={{padding:"9px 10px",textAlign:"center",color:r.actsPend>0?"#ba7517":"#aaa",fontWeight:600}}>{r.actsPend}</td>
              <td style={{padding:"9px 10px",fontSize:12}}>{r.ultima}</td>
              <td style={{padding:"9px 10px",textAlign:"right",fontWeight:600,color:"#1d9e75"}}>€{r.ventaTotal.toLocaleString("es-ES",{minimumFractionDigits:2})}</td>
            </tr>
          ))}</tbody>
        </table>
        {rows.length===0&&<div style={{textAlign:"center",color:"#aaa",marginTop:24,fontSize:13}}>Sin resultados.</div>}
      </div>
    </div>;
  }

  function TabConfiguracion() {
    const sections=[["Canales","canal","canales","#7f77dd"],["Grupos gestores","grupo","grupos","#1d9e75"],["Gestores","gestor","gestores","#378add"]];
    return <div>
      {currentUser.admin&&<><AdminPanel /><NotifConfig activities={activities} clients={clients} currentUser={currentUser} /><Sep label="Listas de configuración" /></>}
      {sections.map(([label,ckey,k,color])=>(
        <div key={ckey} style={{marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{label}</div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <Inp value={newVal[ckey]} onChange={v=>setNewVal(n=>({...n,[ckey]:v}))} placeholder="Nuevo..." />
            <Btn variant="primary" onClick={async()=>{const v=newVal[ckey].trim();if(!v||config[k].includes(v))return;await saveConfig(k,[...config[k],v]);setNewVal(n=>({...n,[ckey]:""}));}}>Añadir</Btn>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {config[k].map(v=>(
              <span key={v} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:16,background:color+"18",border:`1px solid ${color}44`,fontSize:13}}>
                <span style={{color}}>{v}</span>
                <button onClick={async()=>await saveConfig(k,config[k].filter(x=>x!==v))} style={{background:"none",border:"none",cursor:"pointer",color,fontSize:16,lineHeight:1,padding:0}}>×</button>
              </span>
            ))}
          </div>
        </div>
      ))}
    </div>;
  }

  return (
    <div>
      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.5rem",padding:"1rem 1.25rem",borderRadius:12,background:linGrad}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(255,255,255,0.6)",flexShrink:0}}>
            <img src="https://crm-lasingluten.github.io/crm-panificadora/Logo_02.png" alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center"}} />
          </div>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:"#fff",textShadow:"0 1px 2px rgba(0,0,0,0.15)"}}>CRM — {lineaActiva}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.85)",marginTop:2}}>Gestión de clientes B2B</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {/* Selector línea de negocio — solo si tiene más de una */}
          {currentUser.lineas && currentUser.lineas.length > 1 && (
            <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"3px"}}>
              {currentUser.lineas.map(l => (
                <button key={l} onClick={() => cambiarLinea(l)}
                  style={{padding:"4px 12px",borderRadius:16,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:lineaActiva===l?"#fff":"transparent",color:lineaActiva===l?linColor:"rgba(255,255,255,0.8)",transition:"all 0.2s"}}>
                  {l}
                </button>
              ))}
            </div>
          )}
          <div style={{fontSize:12,color:"rgba(255,255,255,0.9)",background:"rgba(255,255,255,0.15)",padding:"4px 12px",borderRadius:20}}>👤 {currentUser.nombre}{currentUser.admin?" ⭐":""}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.2)",padding:"5px 12px",borderRadius:20}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:loading?"#ffd700":error?"#ff6b6b":"#90ee90"}} />
            <span style={{fontSize:12,color:"#fff"}}>{loading?"Conectando…":error?"Sin conexión":"Conectado"}</span>
          </div>
          <Btn onClick={handleLogout} style={{fontSize:12,padding:"5px 12px",background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff"}}>Salir</Btn>
        </div>
      </div>
      <div style={{display:"flex",gap:2,marginBottom:24,borderBottom:"1px solid #e8e8e8",overflowX:"auto"}}>
        {TABS.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"8px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:tab===t?600:400,color:tab===t?linColor:"#666",borderBottom:tab===t?`2px solid ${linColor}`:"2px solid transparent",marginBottom:-1,whiteSpace:"nowrap"}}>{t}</button>)}
      </div>
      {loading?<Spinner/>:error?<ErrMsg msg={error} onRetry={loadAll}/>:<>
        {tab==="Dashboard"     && <Dashboard />}
        {tab==="Clientes"      && <TabClientes />}
        {tab==="Actividades"   && <TabActividades />}
        {tab==="Ventas"        && <TabVentas />}
        {tab==="Informes"      && <TabInformes />}
        {tab==="Configuración" && <TabConfiguracion />}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CRM />);
</script>
</body>
</html>
