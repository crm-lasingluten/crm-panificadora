function toCSV(rows,cols) {
  var h=cols.map(function(c){return c.label;}).join(",");
  var b=rows.map(function(r){return cols.map(function(c){return '"'+String(r[c.key]||"").replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  return h+"\n"+b;
}
function dlCSV(content,filename) {
  var blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
function dlXLSX(data,sheetName,filename) {
  var ws=XLSX.utils.json_to_sheet(data);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,filename);
}

async function sendEmail(gestor,email,momento,resumen) {
  try { await emailjs.send(EJS_SVC,EJS_TPL,{gestor:gestor,email:email,momento:momento,fecha:new Date().toLocaleDateString("es-ES"),resumen:resumen},EJS_KEY); return true; }
  catch(e) { return false; }
}
function buildResumen(gestor,activities,clientName) {
  var pend=activities.filter(function(a){return a.gestor===gestor&&a.estado!=="Completada";});
  var venc=pend.filter(function(a){return ddiff(a.fecha)<0;});
  var hoy =pend.filter(function(a){return ddiff(a.fecha)===0;});
  var prox=pend.filter(function(a){return ddiff(a.fecha)>0&&ddiff(a.fecha)<=3;});
  var txt="";
  if(venc.length){txt+="🔴 VENCIDAS ("+venc.length+"):\n"; venc.forEach(function(a){txt+="  • "+(a.titulo||(a.nota||"").slice(0,40))+" — "+clientName(a.cliente_id)+" — "+a.fecha+"\n";}); txt+="\n";}
  if(hoy.length) {txt+="🟠 HOY ("   +hoy.length +"):\n"; hoy.forEach(function(a) {txt+="  • "+(a.titulo||(a.nota||"").slice(0,40))+" — "+clientName(a.cliente_id)+"\n";});              txt+="\n";}
  if(prox.length){txt+="🟡 PRÓXIMAS ("+prox.length+"):\n"; prox.forEach(function(a){txt+="  • "+(a.titulo||(a.nota||"").slice(0,40))+" — "+clientName(a.cliente_id)+" — "+a.fecha+"\n";}); txt+="\n";}
  if(!txt) txt="✅ ¡Todo al día!\n";
  return txt;
}

// ── PAGINACIÓN ────────────────────────────────────────────────────────────────
function Paginacion(props) {
  var total=props.total, pagina=props.pagina, onChange=props.onChange;
  var totalPags=Math.max(1,Math.ceil(total/POR_PAGINA));
  if(totalPags<=1) return null;
  var pages=[];
  for(var i=1;i<=totalPags;i++) pages.push(i);
  return <div style={{display:"flex",alignItems:"center",gap:6,marginTop:16,flexWrap:"wrap",justifyContent:"center"}}>
    <Btn onClick={function(){onChange(pagina-1);}} disabled={pagina<=1} style={{padding:"5px 10px",fontSize:12}}>‹</Btn>
    {pages.map(function(p){
      return <button key={p} onClick={function(){onChange(p);}}
        style={{width:32,height:32,borderRadius:6,border:"1px solid #ddd",cursor:"pointer",fontWeight:p===pagina?600:400,background:p===pagina?"#185fa5":"#fff",color:p===pagina?"#fff":"#555",fontSize:13}}>
        {p}
      </button>;
    })}
    <Btn onClick={function(){onChange(pagina+1);}} disabled={pagina>=totalPags} style={{padding:"5px 10px",fontSize:12}}>›</Btn>
    <span style={{fontSize:12,color:"#888",marginLeft:8}}>{total} clientes · pág. {pagina}/{totalPags}</span>
  </div>;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login(props) {
  var [gestor,setGestor]=useState("");
  var [pass,setPass]=useState("");
  var [error,setError]=useState("");
  var [loading,setLoading]=useState(false);
  var [usuarios,setUsuarios]=useState([]);
  useEffect(function(){sbGet("usuarios","select=nombre&order=nombre.asc").then(function(r){setUsuarios(r.map(function(x){return x.nombre;}));}).catch(function(){});;},[]);
  function handleLogin(){
    if(!gestor){setError("Selecciona tu nombre");return;}
    if(!pass){setError("Ingresa tu contraseña");return;}
    setLoading(true);
    sbGet("usuarios","nombre=eq."+encodeURIComponent(gestor)+"&select=nombre,password,admin,linea_negocio").then(function(rows){
      if(!rows.length||rows[0].password!==pass){setError("Contraseña incorrecta");setLoading(false);return;}
      var lineas=(rows[0].linea_negocio||"La Sin Gluten").split("|");
      var u={nombre:rows[0].nombre,admin:rows[0].admin,lineas:lineas,lineaActiva:lineas[0]};
      sessionStorage.setItem("crm_session",JSON.stringify(u));
      props.onLogin(u);
    }).catch(function(){setError("Error de conexión");setLoading(false);});
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#8ecfd4,#5bb5bc)"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"2.5rem 2rem",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.15)",animation:"slideIn 0.3s ease"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{width:90,height:90,borderRadius:"50%",overflow:"hidden",margin:"0 auto 1rem",border:"3px solid #8ecfd4"}}>
            <img src="https://crm-lasingluten.github.io/crm-panificadora/Logo_02.png" alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}} />
          </div>
          <div style={{fontSize:18,fontWeight:700}}>CRM Panificadora</div>
          <div style={{fontSize:13,color:"#888",marginTop:4}}>La Sin Gluten · Bauer Lemans</div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:"#666",marginBottom:4}}>Tu nombre</div>
          <Sel value={gestor} onChange={function(v){setGestor(v);setError("");}} options={usuarios} placeholder="Selecciona tu nombre" />
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#666",marginBottom:4}}>Contraseña</div>
          <input type="password" value={pass} onChange={function(e){setPass(e.target.value);setError("");}}
            onKeyDown={function(e){if(e.key==="Enter")handleLogin();}} placeholder="Tu contraseña"
            style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,width:"100%"}} />
        </div>
        {error&&<div style={{fontSize:12,color:"#e24b4a",marginBottom:12,textAlign:"center"}}>{error}</div>}
        <Btn variant="primary" onClick={handleLogin} disabled={loading} style={{width:"100%",padding:"10px",fontSize:14}}>{loading?"Verificando…":"Entrar"}</Btn>
      </div>
    </div>
  );
}

  var [lineas,setLineas]=useState({});

      setUsuarios(rows);
      var em={},ln={};
      rows.forEach(function(r){em[r.id]=r.email||"";ln[r.id]=(r.linea_negocio||"La Sin Gluten").split("|");});
      setEmails(em);setLineas(ln);
    }).catch(function(){});
  },[]);
  function toggleLinea(uid,linea){
    var cur=lineas[uid]||[];
    var upd=cur.includes(linea)?cur.filter(function(l){return l!==linea;}):cur.concat([linea]);
    if(!upd.length)return;
    var next=Object.assign({},lineas);next[uid]=upd;setLineas(next);
  }
  function saveUser(u){
    var np=(newPasses[u.id]||"").trim();
    var em=(emails[u.id]||"").trim();
    var ln=(lineas[u.id]||["La Sin Gluten"]).join("|");
    var body={linea_negocio:ln,email:em};
    if(np){if(np.length<4){alert("Mínimo 4 caracteres");return;}body.password=np;}
    sbPatch("usuarios",u.id,body).then(function(){
      var np2=Object.assign({},newPasses);np2[u.id]="";setNewPasses(np2);
      var sv=Object.assign({},saved);sv[u.id]=true;setSaved(sv);
      setTimeout(function(){var sv2=Object.assign({},saved);sv2[u.id]=false;setSaved(sv2);},2000);
    }).catch(function(e){alert("Error: "+e.message);});
  }
  return (
    <div style={{marginBottom:24}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#555"}}>🔐 Gestión de usuarios</div>
      {usuarios.map(function(u){
        return <div key={u.id} style={{marginBottom:12,padding:"12px 14px",background:"#f9f9f9",borderRadius:8,border:"1px solid #eee"}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>{u.nombre} {u.admin&&<Badge color="#185fa5" label="Admin" />}</div>

            <div style={{fontSize:12,color:"#666",marginBottom:6}}>Líneas de negocio:</div>
            <div style={{display:"flex",gap:12}}>
              {LINEAS.map(function(l){
                return <label key={l} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13}}>
                  <input type="checkbox" checked={(lineas[u.id]||[]).includes(l)} onChange={function(){toggleLinea(u.id,l);}} />
                  <span style={{color:LINEA_COLOR[l],fontWeight:500}}>{l}</span>
                </label>;
              })}
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <input type="email" value={emails[u.id]||""} onChange={function(e){var em=Object.assign({},emails);em[u.id]=e.target.value;setEmails(em);}}
              placeholder="Email notificaciones" style={{padding:"6px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:12,flex:2,minWidth:180}} />
            <input type="password" value={newPasses[u.id]||""} onChange={function(e){var np=Object.assign({},newPasses);np[u.id]=e.target.value;setNewPasses(np);}}
              placeholder="Nueva contraseña" style={{padding:"6px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:12,flex:1,minWidth:140}} />
            <Btn variant="primary" onClick={function(){saveUser(u);}}>{saved[u.id]?"✓ Guardado":"Guardar"}</Btn>
          </div>
        </div>;
      })}
    </div>
  );
}

// ── NOTIF CONFIG ──────────────────────────────────────────────────────────────
function NotifConfig(props) {
  var activities=props.activities,clients=props.clients,currentUser=props.currentUser;
  function clientName(id){var c=clients.find(function(x){return x.id===id;});return c?c.nombre:"—";}
  var [cfg,setCfg]=useState(function(){try{return JSON.parse(localStorage.getItem("crm_notif")||'{"horaM":"08:00","horaT":"18:00","activo":true}');}catch(e){return{horaM:"08:00",horaT:"18:00",activo:true};}});
  var [sending,setSending]=useState(false);
  var [lastSent,setLastSent]=useState(function(){try{return JSON.parse(localStorage.getItem("crm_notif_last")||"{}");}catch(e){return{};}});
  function saveCfg(c){setCfg(c);localStorage.setItem("crm_notif",JSON.stringify(c));}
  function sendAll(momento){
    setSending(true);
    sbGet("usuarios","select=nombre,email").then(function(usuarios){
      var promises=usuarios.filter(function(u){return !!u.email;}).map(function(u){
        var res=buildResumen(u.nombre,activities,clientName);
        return sendEmail(u.nombre,u.email,momento,res);
      });
      Promise.all(promises).then(function(results){
        var ok=results.filter(Boolean).length;
        var now=new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
        var upd=Object.assign({},lastSent);upd[momento]=now;
        setLastSent(upd);localStorage.setItem("crm_notif_last",JSON.stringify(upd));
        setSending(false);alert("✅ Enviado a "+ok+" gestor"+(ok!==1?"es":""));
      });
    }).catch(function(){setSending(false);});
  }
  function sendTest(){
    setSending(true);
    sbGet("usuarios","nombre=eq."+encodeURIComponent(currentUser.nombre)+"&select=nombre,email").then(function(rows){
      var u=rows[0];
      if(!u||!u.email){alert("No tienes email configurado.");setSending(false);return;}
      var res=buildResumen(u.nombre,activities,clientName);
      sendEmail(u.nombre,u.email,"prueba",res).then(function(ok){setSending(false);alert(ok?"✅ Email enviado a "+u.email:"❌ Error.");});
    }).catch(function(){setSending(false);});
  }
  useEffect(function(){
    if(!cfg.activo)return;
    var iv=setInterval(function(){
      var now=new Date();
      var hhmm=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
      var ds=now.toDateString();
      var stored={};try{stored=JSON.parse(localStorage.getItem("crm_notif_auto")||"{}");}catch(e){}
      if(hhmm===cfg.horaM&&stored.m!==ds){var s1=Object.assign({},stored);s1.m=ds;localStorage.setItem("crm_notif_auto",JSON.stringify(s1));sendAll("inicio del día");}
      if(hhmm===cfg.horaT&&stored.t!==ds){var s2=Object.assign({},stored);s2.t=ds;localStorage.setItem("crm_notif_auto",JSON.stringify(s2));sendAll("fin del día");}
    },30000);
    return function(){clearInterval(iv);};
  },[cfg,activities]);
  return (
    <div style={{marginBottom:24}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#555"}}>📧 Notificaciones por email</div>
      <div style={{background:"#f9f9f9",border:"1px solid #eee",borderRadius:10,padding:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <span style={{fontSize:13,fontWeight:500}}>Automáticas</span>
          <label style={{position:"relative",display:"inline-block",width:44,height:24,cursor:"pointer"}}>
            <input type="checkbox" checked={cfg.activo} onChange={function(e){saveCfg(Object.assign({},cfg,{activo:e.target.checked}));}} style={{opacity:0,width:0,height:0}} />
            <span style={{position:"absolute",inset:0,borderRadius:24,background:cfg.activo?"#185fa5":"#ccc",transition:"0.3s"}}>
              <span style={{position:"absolute",top:3,left:cfg.activo?22:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"0.3s"}} />
            </span>
          </label>
          <span style={{fontSize:12,color:cfg.activo?"#1d9e75":"#aaa"}}>{cfg.activo?"Activadas":"Desactivadas"}</span>
        </div>
        <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
          {[["🌅 Mañana","horaM","inicio del día"],["🌆 Tarde","horaT","fin del día"]].map(function(item){
            var l=item[0],k=item[1],mk=item[2];
            return <div key={k} style={{flex:1,minWidth:140}}>
              <div style={{fontSize:12,color:"#666",marginBottom:4}}>{l}</div>
              <input type="time" value={cfg[k]} onChange={function(e){saveCfg(Object.assign({},cfg,{[k]:e.target.value}));}}
                style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,width:"100%"}} />
              {lastSent[mk]&&<div style={{fontSize:11,color:"#aaa",marginTop:3}}>Último: {lastSent[mk]}</div>}
            </div>;
          })}
        </div>
        <div style={{fontSize:12,color:"#888",marginBottom:12}}>⚠️ Requiere que el CRM esté abierto.</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn variant="primary" onClick={sendTest} disabled={sending}>📧 Prueba (solo a mí)</Btn>
          <Btn variant="success" onClick={function(){sendAll("inicio del día");}} disabled={sending}>🌅 Enviar mañana</Btn>
          <Btn variant="success" onClick={function(){sendAll("fin del día");}} disabled={sending}>🌆 Enviar tarde</Btn>
        </div>
      </div>
    </div>
  );
}

// ── NOTIF BANNER — FIX: muestra nombre cliente + hasta 5 items ────────────────
function NotifBanner(props) {
  var activities=props.activities,clients=props.clients,filterGestor=props.filterGestor;
  function clientName(id){var c=clients.find(function(x){return x.id===id;});return c?c.nombre:"—";}
  var alertas=useMemo(function(){
    return activities.filter(function(a){return a.estado!=="Completada"&&(!filterGestor||a.gestor===filterGestor);}).map(function(a){
      var d=ddiff(a.fecha);
      if(d<0) return Object.assign({},a,{tipo:"vencida",label:"Vencida hace "+Math.abs(d)+"d"});
      if(d===0)return Object.assign({},a,{tipo:"hoy",label:"Vence hoy"});
      if(d<=3) return Object.assign({},a,{tipo:"proxima",label:"Vence en "+d+"d"});
      return null;
    }).filter(Boolean).sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  },[activities,filterGestor]);
  var [visible,setVisible]=useState(true);
  useEffect(function(){setVisible(true);},[filterGestor]);
  if(!alertas.length||!visible)return null;
  var isV=alertas.some(function(a){return a.tipo==="vencida";}),isH=alertas.some(function(a){return a.tipo==="hoy";});
  return (
    <div style={{background:isV?"#fef2f2":isH?"#fff7ed":"#fffbeb",border:"1px solid "+(isV?"#fca5a5":isH?"#fed7aa":"#fde68a"),borderRadius:10,padding:"0.75rem 1rem",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{isV?"🔴":isH?"🟠":"🟡"} {alertas.length} actividad{alertas.length!==1?"es":""} requieren atención</div>
          {alertas.slice(0,5).map(function(a){
            return <div key={a.id} style={{fontSize:12,color:"#555",marginBottom:3,display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}>
              <Badge color={isV?"#e24b4a":isH?"#ba7517":"#d97706"} label={a.label} />
              <span><strong>{a.titulo||(a.nota||"").slice(0,30)}</strong>{" — "}{clientName(a.cliente_id)}{" · "}<strong>{a.gestor}</strong></span>
            </div>;
          })}
          {alertas.length>5&&<div style={{fontSize:12,color:"#888",marginTop:4}}>…y {alertas.length-5} más</div>}
        </div>
        <button onClick={function(){setVisible(false);}} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:18,marginLeft:12}}>×</button>
      </div>
    </div>
  );
}

// ── FORM: Contactos múltiples ─────────────────────────────────────────────────

            </div>
            <div style={{flex:1,minWidth:120}}>
              <div style={{fontSize:11,color:"#666",marginBottom:2}}>Sector</div>
              <input value={c.sector||""} onChange={function(e){updateContacto(i,"sector",e.target.value);}} placeholder="Compras, Dirección…"

                style={{padding:"6px 10px",border:"1px solid #ddd",borderRadius:6,fontSize:12,width:"100%"}} />

            <div style={{flex:2,minWidth:160}}>
              <div style={{fontSize:11,color:"#666",marginBottom:2}}>Email</div>
              <input value={c.email||""} onChange={function(e){updateContacto(i,"email",e.target.value);}} placeholder="email@empresa.com"
                style={{padding:"6px 10px",border:"1px solid #ddd",borderRadius:6,fontSize:12,width:"100%"}} />

        + Agregar contacto

  );
}

  var [contactos,setContactos]=useState([]);

      sbGet("contactos","cliente_id=eq."+props.initial.id+"&order=id.asc").then(function(rows){setContactos(rows);}).catch(function(){});
    }
  },[]);

        <FL label="Tipo" flex={1}><Sel value={form.tipo_cliente||"Potencial"} onChange={function(v){set("tipo_cliente",v);}} options={TIPOS_CLI} /></FL>
      </FRow>
      <FRow>
        <FL label="Línea de negocio" flex={1}><Sel value={form.linea_negocio||lineaActiva} onChange={function(v){set("linea_negocio",v);}} options={LINEAS} /></FL>
      </FRow>
      <Sep label="Dirección" />
      <FRow>
        <FL label="Calle" flex={3}><Inp value={form.calle} onChange={function(v){set("calle",v);}} placeholder="Calle" /></FL>
        <FL label="Número" flex={1}><Inp value={form.numero} onChange={function(v){set("numero",v);}} placeholder="Nº" /></FL>
      </FRow>
      <FRow>
        <FL label="CP" flex={1}><Inp value={form.cp} onChange={function(v){set("cp",v);}} placeholder="08001" /></FL>
        <FL label="Ciudad" flex={2}><Inp value={form.ciudad} onChange={function(v){set("ciudad",v);}} placeholder="Ciudad" /></FL>
        <FL label="País" flex={2}><Inp value={form.pais} onChange={function(v){set("pais",v);}} placeholder="España" /></FL>
      </FRow>
      <Sep label="Contactos" />
      <ContactosEditor contactos={contactos} onChange={setContactos} />
      <Sep label="Clasificación" />
      <FRow>
        <FL label="Canal" flex={1}><Sel value={form.canal} onChange={function(v){set("canal",v);}} options={config.canales} placeholder="Seleccionar" /></FL>
        <FL label="Grupo" flex={1}><Sel value={form.grupo} onChange={function(v){set("grupo",v);}} options={config.grupos} placeholder="Seleccionar" /></FL>
        <FL label="Gestor" flex={1}><Sel value={form.gestor} onChange={function(v){set("gestor",v);}} options={config.gestores} placeholder="Seleccionar" /></FL>
      </FRow>
      <Sep label="Comentarios" />
      <FRow><FL label="Comentarios del cliente"><Textarea value={form.comentarios||""} onChange={function(v){set("comentarios",v);}} placeholder="Notas internas, observaciones…" rows={3} /></FL></FRow>
      <Btn variant="primary" onClick={handleSave} disabled={saving} style={{width:"100%",marginTop:8}}>{saving?"Guardando…":"Guardar"}</Btn>

  );

// ── IMPORT CLIENTES ───────────────────────────────────────────────────────────
function ImportExcel(props) {
  var config=props.config,clients=props.clients,onImport=props.onImport,onClose=props.onClose,lineaActiva=props.lineaActiva;
  var [preview,setPreview]=useState(null);
  var [importing,setImporting]=useState(false);
  var [result,setResult]=useState(null);
  var fileRef=useRef();
  function handleFile(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(evt){
      try{
        var wb=XLSX.read(evt.target.result,{type:"binary"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        var mapped=rows.map(function(r){
          var keys=Object.keys(r);
          function get(idx,names){
            for(var i=0;i<names.length;i++){
              var n=names[i];
              var k=keys.find(function(k){return k.toLowerCase().replace(/\s+/g,"").indexOf(n.toLowerCase().replace(/\s+/g,""))>=0;});
              if(k!==undefined&&String(r[k]||"").trim()!=="")return String(r[k]||"").trim();
            }
            return String(r[keys[idx]]||"").trim();
          }
          var lineaRaw=get(15,["linea","línea","line"]);
          var linea=LINEAS.indexOf(lineaRaw)>=0?lineaRaw:lineaActiva;
          return {
            nombre:get(0,["nombre empresa","nombre","empresa"])||"",
            nif:get(1,["nif","cif","vat"])||null,
            calle:get(2,["calle","street"])||null,
            numero:get(3,["numero","número"])||null,
            cp:get(4,["cp","postal"])||null,
            ciudad:get(5,["ciudad","city"])||null,
            pais:get(6,["pais","país","country"])||"España",
            telefono:get(7,["telefono","teléfono","phone","tel"])||null,
            email:get(8,["email","mail","correo"])||null,
            contacto:get(9,["contacto","contact"])||null,
            canal:get(10,["canal"])||null,
            grupo:get(11,["grupo","group"])||null,
            gestor:get(12,["gestor","manager"])||null,
            tipo_cliente:get(13,["tipo"])||"Potencial",
            comentarios:get(14,["comentarios","comentario","notas"])||null,
            linea_negocio:linea,
          };
        }).filter(function(r){return !!r.nombre;});
        setPreview(mapped);setResult(null);
      }catch(err){alert("Error: "+err.message);}
    };
    reader.readAsBinaryString(file);
  }
  function handleImport(){
    if(!preview||!preview.length)return;
    setImporting(true);
    var ok=0,skip=0,err=0,errores=[],idx=0;
    function next(){
      if(idx>=preview.length){setImporting(false);setResult({ok:ok,skip:skip,err:err,errores:errores});if(ok>0)onImport();return;}
      var row=preview[idx++];
      var existe=clients.some(function(c){return norm(c.nombre)===norm(row.nombre);});
      if(existe){skip++;next();return;}
      sbPost("clientes",row).then(function(){ok++;next();}).catch(function(e){err++;errores.push(row.nombre+": "+e.message);next();});
    }
    next();
  }
  function downloadTemplate(){
    var ws=XLSX.utils.aoa_to_sheet([
      ["Nombre empresa","NIF","Calle","Número","CP","Ciudad","País","Teléfono","Email","Contacto","Canal","Grupo","Gestor","Tipo(Potencial/Cliente/Inactivo)","Comentarios","Línea de negocio"],
      ["Ejemplo SL","B12345678","Calle Mayor","1","08001","Barcelona","España","34612345678","info@ejemplo.com","Juan García","Digital","Norte","Rodrigo","Potencial","Comentario","La Sin Gluten"]
    ]);
    var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Clientes");XLSX.writeFile(wb,"plantilla_clientes.xlsx");
  }
  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:15,fontWeight:600}}>📥 Importar clientes</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888"}}>×</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <Btn variant="success" onClick={downloadTemplate}>⬇ Plantilla</Btn>
        <Btn variant="primary" onClick={function(){fileRef.current.value="";fileRef.current.click();}}>📂 Seleccionar archivo</Btn>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}} />
      </div>
      {preview&&<div>
        <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Vista previa — {preview.length} clientes</div>
        <div style={{overflowX:"auto",maxHeight:200,overflowY:"auto",marginBottom:12,border:"1px solid #eee",borderRadius:8}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead style={{background:"#f9f9f9",position:"sticky",top:0}}>
              <tr>{["Empresa","NIF","Ciudad","Gestor","Tipo","Línea"].map(function(h){return <th key={h} style={{padding:"6px 8px",textAlign:"left",fontWeight:600,color:"#555",borderBottom:"1px solid #eee"}}>{h}</th>;})}</tr>
            </thead>
            <tbody>{preview.map(function(r,i){
              return <tr key={i} style={{borderBottom:"1px solid #f5f5f5"}}>
                <td style={{padding:"5px 8px",fontWeight:500}}>{r.nombre}</td>
                <td style={{padding:"5px 8px",color:"#888"}}>{r.nif||"—"}</td>
                <td style={{padding:"5px 8px",color:"#888"}}>{r.ciudad||"—"}</td>
                <td style={{padding:"5px 8px"}}>{r.gestor||"—"}</td>
                <td style={{padding:"5px 8px"}}><Badge color={TCLI_C[r.tipo_cliente]||"#888"} label={r.tipo_cliente||"Potencial"} /></td>
                <td style={{padding:"5px 8px"}}><Badge color={LINEA_COLOR[r.linea_negocio]||"#888"} label={r.linea_negocio||lineaActiva} /></td>
              </tr>;
            })}</tbody>
          </table>
        </div>
        {result
          ?<div style={{padding:"10px 14px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,fontSize:13}}>
              ✅ <strong>{result.ok}</strong> importados · <strong>{result.skip}</strong> omitidos · <strong>{result.err}</strong> errores
              {result.errores&&result.errores.length>0&&<div style={{marginTop:8,maxHeight:100,overflowY:"auto",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"6px 10px"}}>
                {result.errores.map(function(e,i){return <div key={i} style={{fontSize:11,color:"#b91c1c",marginBottom:2}}>⚠️ {e}</div>;})}
              </div>}
            </div>
          :<Btn variant="primary" onClick={handleImport} disabled={importing} style={{width:"100%"}}>{importing?"Importando…":"Importar "+preview.length+" clientes"}</Btn>
        }
      </div>}
    </Card>
  );
}

// ── GRÁFICO ───────────────────────────────────────────────────────────────────
function VentasChart(props) {
  var data=props.data||[];
  var canvasRef=useRef(),chartRef=useRef();
  useEffect(function(){
    if(!data.length)return;
    if(chartRef.current)chartRef.current.destroy();
    var labels=[];data.forEach(function(d){if(labels.indexOf(d.label)<0)labels.push(d.label);});
    var totals=labels.map(function(l){return data.filter(function(d){return d.label===l;}).reduce(function(s,d){return s+(d.venta_neta||0);},0);});
    chartRef.current=new Chart(canvasRef.current,{type:"bar",data:{labels:labels,datasets:[{label:"Venta Neta (€)",data:totals,backgroundColor:"#8ecfd488",borderColor:"#5bb5bc",borderWidth:2,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return "€ "+ctx.raw.toLocaleString("es-ES",{minimumFractionDigits:2});}}}},scales:{y:{ticks:{callback:function(v){return "€"+v.toLocaleString("es-ES");}}}}}});
    return function(){if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  if(!data.length)return <div style={{textAlign:"center",color:"#aaa",padding:"2rem",fontSize:13}}>Sin datos.</div>;
  return <div style={{height:280,position:"relative"}}><canvas ref={canvasRef} /></div>;
}

// ── PEDIDOS / PROFORMAS ───────────────────────────────────────────────────────

function usePedidosData(lineaActiva) {
  var [pedidos,setPedidos]=useState([]);
  var [productos,setProductos]=useState([]);
  var [listas,setListas]=useState([]);
  var [precios,setPrecios]=useState([]);
  var [loading,setLoading]=useState(false);

  var reload=useCallback(function(){
    setLoading(true);
    Promise.all([
      sbGet("pedidos","linea_negocio=eq."+encodeURIComponent(lineaActiva)+"&order=id.desc"),
      sbGet("productos","activo=eq.true&order=nombre.asc"),
      sbGet("listas_precio","activo=eq.true&order=nombre.asc"),
      sbGet("precios","select=*"),
    ]).then(function(r){
      setPedidos(r[0]);setProductos(r[1]);setListas(r[2]);setPrecios(r[3]);setLoading(false);
    }).catch(function(){setLoading(false);});
  },[lineaActiva]);

  useEffect(function(){reload();},[reload]);
  return {pedidos,productos,listas,precios,loading,reload};
}

// ── Gestión de Productos y Listas (dentro de Configuración o Pedidos) ─────────
function ProductosManager(props) {
  var {linColor,lineaActiva,currentUser}=props;
  var [productos,setProductos]=useState([]);
  var [listas,setListas]=useState([]);
  var [precios,setPrecios]=useState([]);
  var [tab,setTab]=useState("productos");
  var [editProd,setEditProd]=useState(null);
  var [editLista,setEditLista]=useState(null);
  var [saving,setSaving]=useState(false);

  // Líneas visibles según usuario
  var lineasVisibles=currentUser&&currentUser.lineas?currentUser.lineas:LINEAS;
  var [lineaFiltro,setLineaFiltro]=useState(lineaActiva);

  var emptyProd={codigo:"",nombre:"",descripcion:"",unidad_medida:"Unidad",linea_negocio:lineaActiva,activo:true,
    presentacion:"",sacos_por_pallet:"",unidades_por_caja:"",unidades_por_pallet:"",caducidad_meses:"",iva_producto:21};
  var emptyLista={nombre:"",linea_negocio:lineaActiva,activo:true};

  function reload(){
    Promise.all([
      sbGet("productos","order=nombre.asc"),
      sbGet("listas_precio","order=nombre.asc"),
      sbGet("precios","select=*"),
    ]).then(function(r){setProductos(r[0]);setListas(r[1]);setPrecios(r[2]);});
  }
  useEffect(function(){reload();},[]);

  function saveProd(f){
    setSaving(true);
    var body={
      codigo:f.codigo,nombre:f.nombre,descripcion:f.descripcion||null,
      unidad_medida:f.unidad_medida||"Unidad",
      linea_negocio:f.linea_negocio||lineaActiva,activo:true,
      presentacion:f.presentacion||null,
      sacos_por_pallet:f.sacos_por_pallet?parseFloat(f.sacos_por_pallet):null,
      unidades_por_caja:f.unidades_por_caja?parseFloat(f.unidades_por_caja):null,
      unidades_por_pallet:f.unidades_por_pallet?parseFloat(f.unidades_por_pallet):null,
      caducidad_meses:f.caducidad_meses?parseInt(f.caducidad_meses):null,
      iva_producto:parseFloat(f.iva_producto||21),
    };
    var p=f.id?sbPatch("productos",f.id,body):sbPost("productos",body);
    p.then(function(){reload();setEditProd(null);setSaving(false);}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }
  function deleteProd(id){if(!confirm("¿Eliminar producto?"))return;sbDel("productos",id).then(reload);}
  function saveLista(f){
    setSaving(true);
    var body={nombre:f.nombre,linea_negocio:f.linea_negocio||lineaActiva,activo:true};
    var p=f.id?sbPatch("listas_precio",f.id,body):sbPost("listas_precio",body);
    p.then(function(){reload();setEditLista(null);setSaving(false);}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }
  function deleteLista(id){if(!confirm("¿Eliminar lista?"))return;sbDel("listas_precio",id).then(reload);}
  function savePrecio(productoId,listaId,valor){
    var existing=precios.find(function(p){return p.producto_id===productoId&&p.lista_id===listaId;});
    var num=parseFloat(valor)||0;
    if(existing){sbPatch("precios",existing.id,{precio:num}).then(reload);}
    else{sbPost("precios",{producto_id:productoId,lista_id:listaId,precio:num}).then(reload);}
  }
  function getPrecio(prodId,listaId){var p=precios.find(function(x){return x.producto_id===prodId&&x.lista_id===listaId;});return p?p.precio:"";}

  var prodFilt=productos.filter(function(p){return p.linea_negocio===lineaFiltro;});
  var listasFilt=listas.filter(function(l){return l.linea_negocio===lineaFiltro;});

          {item[1]}
        </button>;

    {tab==="productos"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

        <Btn variant="primary" onClick={function(){setEditProd(Object.assign({},emptyProd,{linea_negocio:lineaFiltro}));}}>+ Producto</Btn>
      </div>
      {editProd&&<Card style={{marginBottom:16,border:"1px solid "+linColor+"44"}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>{editProd.id?"Editar producto":"Nuevo producto"}</div>
        <FRow>
          <FL label="Código *" flex={1}><Inp value={editProd.codigo} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{codigo:v});});}} placeholder="PROD001" /></FL>
          <FL label="Nombre *" flex={3}><Inp value={editProd.nombre} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{nombre:v});});}} placeholder="Nombre del producto" /></FL>
          <FL label="Línea" flex={1}>

          <FL label="Presentación (ej: Kg, 500g, 1L)" flex={2}><Inp value={editProd.presentacion||""} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{presentacion:v});});}} placeholder="Ej: 500g, 1 Kg, 5L…" /></FL>

          </FL>
          <FL label="IVA del producto" flex={1}>

              style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,background:"#fff",width:"100%"}}>
              {IVA_TIPOS.map(function(i){return <option key={i.value} value={i.value}>{i.label}</option>;})}

        </FRow>
        <FRow>
          <FL label="Uds. por caja" flex={1}><Inp type="number" value={editProd.unidades_por_caja||""} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{unidades_por_caja:v});});}} placeholder="0" /></FL>
          <FL label="Sacos por pallet" flex={1}><Inp type="number" value={editProd.sacos_por_pallet||""} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{sacos_por_pallet:v});});}} placeholder="0" /></FL>
          <FL label="Uds. por pallet" flex={1}><Inp type="number" value={editProd.unidades_por_pallet||""} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{unidades_por_pallet:v});});}} placeholder="0" /></FL>
          <FL label="Caducidad (meses)" flex={1}><Inp type="number" value={editProd.caducidad_meses||""} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{caducidad_meses:v});});}} placeholder="0" /></FL>
        </FRow>
        <FRow>
          <FL label="Descripción"><Inp value={editProd.descripcion||""} onChange={function(v){setEditProd(function(f){return Object.assign({},f,{descripcion:v});});}} placeholder="Descripción opcional" /></FL>
        </FRow>
        <div style={{display:"flex",gap:8}}>
          <Btn variant="primary" onClick={function(){saveProd(editProd);}} disabled={saving||!editProd.codigo||!editProd.nombre}>{saving?"Guardando…":"Guardar"}</Btn>
          <Btn onClick={function(){setEditProd(null);}}>Cancelar</Btn>
        </div>
      </Card>}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,background:"#fff",borderRadius:10}}>
          <thead style={{background:"#f9f9f9"}}><tr>
            {["Código","Nombre","Presentación","Unidad","Uds/Caja","Sacos/Pallet","Uds/Pallet","Caducidad","IVA",""].map(function(h){
              return <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:"#555",fontSize:11,borderBottom:"1px solid #eee",whiteSpace:"nowrap"}}>{h}</th>;
            })}
          </tr></thead>
          <tbody>{prodFilt.map(function(p){
            return <tr key={p.id} style={{borderBottom:"1px solid #f5f5f5"}}>
              <td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11,color:linColor,fontWeight:600}}>{p.codigo}</td>
              <td style={{padding:"7px 10px",fontWeight:500,whiteSpace:"nowrap"}}>{p.nombre}</td>
              <td style={{padding:"7px 10px",color:"#666"}}>{p.presentacion||"—"}</td>
              <td style={{padding:"7px 10px"}}><Badge color="#7f77dd" label={p.unidad_medida||"Unidad"} /></td>
              <td style={{padding:"7px 10px",textAlign:"center",color:"#555"}}>{p.unidades_por_caja||"—"}</td>
              <td style={{padding:"7px 10px",textAlign:"center",color:"#555"}}>{p.sacos_por_pallet||"—"}</td>
              <td style={{padding:"7px 10px",textAlign:"center",color:"#555"}}>{p.unidades_por_pallet||"—"}</td>
              <td style={{padding:"7px 10px",textAlign:"center",color:"#555"}}>{p.caducidad_meses?p.caducidad_meses+" m":"—"}</td>
              <td style={{padding:"7px 10px"}}><Badge color="#ba7517" label={(p.iva_producto||21)+"%"} /></td>
              <td style={{padding:"7px 6px"}}>
                <div style={{display:"flex",gap:4}}>
                  <Btn onClick={function(){setEditProd(Object.assign({},p));}} style={{fontSize:11,padding:"3px 8px"}}>✏️</Btn>
                  <Btn variant="danger" onClick={function(){deleteProd(p.id);}} style={{fontSize:11,padding:"3px 8px"}}>🗑️</Btn>
                </div>
              </td>
            </tr>;
          })}</tbody>
        </table>
      </div>
      {!prodFilt.length&&<div style={{textAlign:"center",color:"#aaa",padding:"2rem",fontSize:13}}>No hay productos para <strong>{lineaFiltro}</strong>. Crea el primero.</div>}
    </div>}

    {tab==="listas"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,color:"#555"}}>Listas de <strong>{lineaFiltro}</strong> ({listasFilt.length})</span>
        <Btn variant="primary" onClick={function(){setEditLista(Object.assign({},emptyLista,{linea_negocio:lineaFiltro}));}}>+ Lista</Btn>
      </div>
      {editLista&&<Card style={{marginBottom:16,border:"1px solid "+linColor+"44"}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>{editLista.id?"Editar lista":"Nueva lista de precio"}</div>
        <FRow>
          <FL label="Nombre de la lista" flex={2}><Inp value={editLista.nombre} onChange={function(v){setEditLista(function(f){return Object.assign({},f,{nombre:v});});}} placeholder="Ej: Tarifa General, Canal Farmacia…" /></FL>
          <FL label="Línea" flex={1}>
            <select value={editLista.linea_negocio} onChange={function(e){setEditLista(function(f){return Object.assign({},f,{linea_negocio:e.target.value});});}}
              style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,background:"#fff",width:"100%"}}>
              {lineasVisibles.map(function(l){return <option key={l} value={l}>{l}</option>;})}
            </select>
          </FL>
        </FRow>
        <div style={{display:"flex",gap:8}}>
          <Btn variant="primary" onClick={function(){saveLista(editLista);}} disabled={saving||!editLista.nombre}>{saving?"Guardando…":"Guardar"}</Btn>
          <Btn onClick={function(){setEditLista(null);}}>Cancelar</Btn>
        </div>
      </Card>}
      <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
        {listasFilt.map(function(l){
          return <div key={l.id} style={{padding:"12px 16px",background:"#fff",border:"1px solid #e8e8e8",borderRadius:10,display:"flex",alignItems:"center",gap:10}}>
            <Badge color={LINEA_COLOR[l.linea_negocio]||"#888"} label={l.linea_negocio} />
            <span style={{fontSize:13,fontWeight:600}}>{l.nombre}</span>
            <Btn onClick={function(){setEditLista(Object.assign({},l));}} style={{fontSize:11,padding:"3px 8px"}}>✏️</Btn>
            <Btn variant="danger" onClick={function(){deleteLista(l.id);}} style={{fontSize:11,padding:"3px 8px"}}>🗑️</Btn>
          </div>;
        })}
        {!listasFilt.length&&<div style={{color:"#aaa",fontSize:13}}>No hay listas de precio para <strong>{lineaFiltro}</strong>.</div>}
      </div>
    </div>}

    {tab==="tabla"&&<div>
      <div style={{fontSize:13,color:"#555",marginBottom:12}}>Precios por producto y lista — <strong>{lineaFiltro}</strong></div>
      {(!prodFilt.length||!listasFilt.length)
        ?<div style={{color:"#aaa",fontSize:13,padding:"1rem"}}>Necesitas al menos un producto y una lista de precio en <strong>{lineaFiltro}</strong> para configurar la tabla.</div>
        :<div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",fontSize:12,background:"#fff",borderRadius:10,minWidth:400}}>
            <thead style={{background:"#f9f9f9"}}>
              <tr>
                <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"#555",borderBottom:"1px solid #eee",whiteSpace:"nowrap"}}>Producto</th>
                <th style={{padding:"8px 12px",fontWeight:600,color:"#888",borderBottom:"1px solid #eee",fontSize:11}}>Unidad</th>
                {listasFilt.map(function(l){return <th key={l.id} style={{padding:"8px 12px",textAlign:"center",fontWeight:600,color:linColor,borderBottom:"1px solid #eee",whiteSpace:"nowrap",minWidth:110}}>{l.nombre}</th>;})}
              </tr>
            </thead>
            <tbody>{prodFilt.map(function(p){
              return <tr key={p.id} style={{borderBottom:"1px solid #f5f5f5"}}>
                <td style={{padding:"7px 12px",fontWeight:500,whiteSpace:"nowrap"}}>{p.nombre}{p.presentacion&&<span style={{marginLeft:6,fontSize:11,color:"#aaa"}}>{p.presentacion}</span>}</td>
                <td style={{padding:"7px 12px"}}><Badge color="#7f77dd" label={p.unidad_medida||"Unidad"} /></td>
                {listasFilt.map(function(l){
                  var val=getPrecio(p.id,l.id);
                  return <td key={l.id} style={{padding:"4px 8px",textAlign:"center"}}>
                    <input type="number" step="0.01" min="0"
                      defaultValue={val}
                      onBlur={function(e){savePrecio(p.id,l.id,e.target.value);}}
                      style={{width:90,padding:"5px 8px",border:"1px solid #ddd",borderRadius:6,fontSize:12,textAlign:"right"}}
                      placeholder="0.00" />
                  </td>;
                })}
              </tr>;
            })}</tbody>
          </table>
        </div>
      }
    </div>}
  </div>;
}

// ── Editor de pedido/proforma ─────────────────────────────────────────────────
function PedidoEditor(props) {
  var {clients,lineaActiva,linColor,currentUser,onSaved,onCancel,initial,config}=props;
  var [productos,setProductos]=useState([]);
  var [listas,setListas]=useState([]);
  var [precios,setPrecios]=useState([]);
  var [saving,setSaving]=useState(false);
  var [busqCli,setBusqCli]=useState("");
  var [showDropdown,setShowDropdown]=useState(false);

  var initForm={tipo:"pedido",cliente_id:"",lista_id:"",fecha:tod(),fecha_entrega:"",direccion_entrega:"",observaciones:"",gestor:currentUser.nombre,linea_negocio:lineaActiva};
  var [form,setForm]=useState(initial?Object.assign({},initForm,initial):initForm);
  var [lineas,setLineas]=useState(initial&&initial._lineas?initial._lineas:[]);

  useEffect(function(){
    Promise.all([
      sbGet("productos","activo=eq.true&linea_negocio=eq."+encodeURIComponent(lineaActiva)+"&order=nombre.asc"),
      sbGet("listas_precio","activo=eq.true&linea_negocio=eq."+encodeURIComponent(lineaActiva)+"&order=nombre.asc"),
      sbGet("precios","select=*"),
    ]).then(function(r){setProductos(r[0]);setListas(r[1]);setPrecios(r[2]);});
  },[lineaActiva]);

  // Si hay cliente inicial, pre-rellenar búsqueda
  useEffect(function(){
    if(initial&&initial.cliente_id){
      var c=clients.find(function(x){return x.id===parseInt(initial.cliente_id);});
      if(c)setBusqCli(c.nombre);
    }
  },[]);

  function set(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}

  function getPrecioLista(prodId,listaId){
    if(!listaId)return 0;
    var p=precios.find(function(x){return x.producto_id===prodId&&x.lista_id===parseInt(listaId);});
    return p?p.precio:0;
  }

  function addLinea(prod){
    if(lineas.find(function(l){return l.producto_id===prod.id;}))return;
    var precio=getPrecioLista(prod.id,form.lista_id);
    var iva=parseFloat(prod.iva_producto||21);
    setLineas(function(prev){return prev.concat([{
      producto_id:prod.id,codigo:prod.codigo,nombre:prod.nombre,
      unidad_medida:prod.unidad_medida||"Unidad",
      cantidad:1,precio:precio,iva:iva,
      subtotal:precio,iva_importe:precio*iva/100,total_linea:precio*(1+iva/100)
    }]);});
  }

  function updateLinea(idx,k,v){
    setLineas(function(prev){
      return prev.map(function(l,i){
        if(i!==idx)return l;
        var upd=Object.assign({},l,{[k]:parseFloat(v)||0});
        upd.subtotal=upd.cantidad*upd.precio;
        upd.iva_importe=upd.subtotal*(upd.iva||21)/100;
        upd.total_linea=upd.subtotal+upd.iva_importe;
        return upd;
      });
    });
  }

  function removeLinea(idx){setLineas(function(prev){return prev.filter(function(_,i){return i!==idx;});});}

  function handleListaChange(listaId){
    set("lista_id",listaId);
    setLineas(function(prev){return prev.map(function(l){
      var p=precios.find(function(x){return x.producto_id===l.producto_id&&x.lista_id===parseInt(listaId);});
      var precio=p?p.precio:l.precio;
      var iva=l.iva||21;
      var subtotal=parseFloat(l.cantidad||0)*precio;
      return Object.assign({},l,{precio:precio,subtotal:subtotal,iva_importe:subtotal*iva/100,total_linea:subtotal*(1+iva/100)});
    });});
  }

  // Totales agrupados por IVA (proforma)
  var subtotalBase=lineas.reduce(function(s,l){return s+(l.subtotal||0);},0);
  var gruposIva=lineas.reduce(function(acc,l){
    var k=l.iva||21;
    if(!acc[k])acc[k]={base:0,iva:0};
    acc[k].base+=l.subtotal||0;
    acc[k].iva+=l.iva_importe||0;
    return acc;
  },{});
  var totalIvaSum=Object.values(gruposIva).reduce(function(s,g){return s+g.iva;},0);
  var totalFinal=subtotalBase+totalIvaSum;

  var clientesFilt=useMemo(function(){
    var q=norm(busqCli);
    return clients.filter(function(c){return c.linea_negocio===lineaActiva&&(!q||norm(c.nombre).indexOf(q)>=0||norm(c.codigo||"").indexOf(q)>=0);});
  },[clients,lineaActiva,busqCli]);

  var clienteSel=clients.find(function(c){return c.id===parseInt(form.cliente_id);});

  function handleSave(){
    if(!form.cliente_id||!lineas.length){alert("Selecciona un cliente y añade al menos un producto.");return;}
    setSaving(true);
    var prefix=form.tipo==="pedido"?"PED":"PRF";
    sbGet("pedidos","tipo=eq."+form.tipo+"&select=numero&order=id.desc&limit=1").then(function(rows){
      var lastNum=0;
      if(rows.length&&rows[0].numero){var m=rows[0].numero.match(/(\d+)$/);if(m)lastNum=parseInt(m[1]);}
      var numero=prefix+"-"+lineaActiva.replace(/\s+/g,"").toUpperCase().slice(0,3)+"-"+String(lastNum+1).padStart(5,"0");
      var body={numero:numero,tipo:form.tipo,cliente_id:parseInt(form.cliente_id),lista_id:form.lista_id?parseInt(form.lista_id):null,fecha:form.fecha,fecha_entrega:form.fecha_entrega||null,direccion_entrega:form.direccion_entrega||null,observaciones:form.observaciones||null,iva:21,subtotal:subtotalBase,total_iva:totalIvaSum,total:totalFinal,gestor:form.gestor||currentUser.nombre,linea_negocio:lineaActiva,estado:"Borrador"};
      var saveP=form.id?sbPatch("pedidos",form.id,body):sbPost("pedidos",body);
      return saveP.then(function(saved){
        var pedidoId=form.id||(Array.isArray(saved)?saved[0].id:saved.id);
        var delP=form.id?sbDelWhere("pedido_lineas","pedido_id=eq."+pedidoId):Promise.resolve();
        return delP.then(function(){
          var idx=0;
          function nextL(){
            if(idx>=lineas.length)return Promise.resolve({id:pedidoId,numero:numero});
            var l=lineas[idx++];
            return sbPost("pedido_lineas",{pedido_id:pedidoId,producto_id:l.producto_id,codigo:l.codigo,nombre:l.nombre,unidad:l.unidad_medida,cantidad:l.cantidad,precio:form.tipo==="proforma"?l.precio:0,subtotal:form.tipo==="proforma"?l.subtotal:0,iva_linea:l.iva,iva_importe:form.tipo==="proforma"?l.iva_importe:0,total_linea:form.tipo==="proforma"?l.total_linea:0}).then(nextL);
          }
          return nextL();
        });
      });
    }).then(function(result){setSaving(false);onSaved(result);}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }

  var gestores=config&&config.gestores?config.gestores:[currentUser.nombre];

  return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:15,fontWeight:600}}>{form.id?"Editar":"Nuevo"}</span>
        <div style={{display:"flex",gap:4,background:"#f5f5f5",borderRadius:20,padding:3}}>
          {["pedido","proforma"].map(function(t){
            return <button key={t} onClick={function(){set("tipo",t);}}
              style={{padding:"4px 14px",borderRadius:16,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:form.tipo===t?linColor:"transparent",color:form.tipo===t?"#fff":"#666",textTransform:"capitalize"}}>
              {t==="pedido"?"📦 Pedido":"📄 Proforma"}
            </button>;
          })}
        </div>
      </div>
      <button onClick={onCancel} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888"}}>×</button>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
      {/* Cliente */}
      <div>
        <div style={{fontSize:12,color:"#666",marginBottom:4}}>Cliente *</div>
        <div style={{position:"relative"}}>
          <input value={busqCli} onChange={function(e){setBusqCli(e.target.value);setShowDropdown(true);}} onFocus={function(){setShowDropdown(true);}}
            placeholder="🔍 Buscar cliente…"
            style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,width:"100%"}} />
          {showDropdown&&busqCli.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #ddd",borderRadius:8,boxShadow:"0 4px 16px rgba(0,0,0,0.1)",zIndex:100,maxHeight:200,overflowY:"auto"}}>
            {clientesFilt.slice(0,20).map(function(c){
              return <div key={c.id} onClick={function(){set("cliente_id",c.id);setBusqCli(c.nombre);setShowDropdown(false);
                var dir=[c.calle,c.numero].filter(Boolean).join(" ");
                if(c.cp||c.ciudad)dir+=(dir?", ":"")+[c.cp,c.ciudad].filter(Boolean).join(" ");
                if(c.pais)dir+=(dir?", ":"")+c.pais;
                if(!form.direccion_entrega)set("direccion_entrega",dir);
              }}
                style={{padding:"8px 12px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #f5f5f5"}}
                onMouseEnter={function(e){e.currentTarget.style.background="#f5f5f5";}}
                onMouseLeave={function(e){e.currentTarget.style.background="";}}>
                <span style={{fontWeight:500}}>{c.nombre}</span>
                {c.codigo&&<span style={{fontSize:11,color:"#888",marginLeft:6}}>{c.codigo}</span>}
              </div>;
            })}
            {clientesFilt.length===0&&<div style={{padding:"8px 12px",color:"#aaa",fontSize:12}}>Sin resultados</div>}
          </div>}
        </div>
        {clienteSel&&<div style={{marginTop:8,padding:"10px 12px",background:"#f0fdf4",borderRadius:8,fontSize:12,border:"1px solid #86efac"}}>
          <div style={{fontWeight:700,fontSize:13}}>{clienteSel.nombre}</div>
          {clienteSel.codigo&&<div style={{color:"#888",fontSize:11}}>Cód: {clienteSel.codigo}</div>}
          <div style={{color:"#555",marginTop:2}}>
            {[clienteSel.calle,clienteSel.numero].filter(Boolean).join(" ")}
            {(clienteSel.cp||clienteSel.ciudad)?", "+[clienteSel.cp,clienteSel.ciudad].filter(Boolean).join(" "):""}
            {clienteSel.pais?", "+clienteSel.pais:""}
          </div>
          {clienteSel.telefono&&<div style={{color:"#555"}}>📞 {clienteSel.telefono}</div>}
          {clienteSel.email&&<div style={{color:"#555"}}>✉️ {clienteSel.email}</div>}
          {clienteSel.nif&&<div style={{color:"#555"}}>NIF: {clienteSel.nif}</div>}
          {clienteSel.persona_contacto&&<div style={{color:"#555"}}>Contacto: {clienteSel.persona_contacto}</div>}
        </div>}
      </div>

      {/* Datos documento */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <FRow>
          <FL label="Fecha" flex={1}><Inp type="date" value={form.fecha} onChange={function(v){set("fecha",v);}} /></FL>
          <FL label="Fecha entrega" flex={1}><Inp type="date" value={form.fecha_entrega} onChange={function(v){set("fecha_entrega",v);}} /></FL>
        </FRow>
        <FL label="Lista de precio">
          <select value={form.lista_id} onChange={function(e){handleListaChange(e.target.value);}}
            style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,background:"#fff",width:"100%"}}>
            <option value="">— Sin lista —</option>
            {listas.map(function(l){return <option key={l.id} value={l.id}>{l.nombre}</option>;})}
          </select>
        </FL>
        <FL label="Gestor">
          <select value={form.gestor} onChange={function(e){set("gestor",e.target.value);}}

      sbGet("pdf_log","order=created_at.desc&limit=50").then(function(r){setPdfLog(r);setLoadingLog(false);}).catch(function(){setLoadingLog(false);});
    });

  function handleSaved(result){

      generarPDF(pedido,lineas,cliente,currentUser,logoUrl);

    }).catch(function(e){alert("Error cargando líneas: "+e.message);});
  }

  function handleDelete(pedido){
    if(!confirm("¿Eliminar "+pedido.tipo+" "+pedido.numero+"?"))return;
    sbDel("pedidos",pedido.id).then(function(){reload();setSelected(null);}).catch(function(e){alert("Error: "+e.message);});
  }

  var pedidosFilt=pedidos.filter(function(p){
    if(filtroTipo&&p.tipo!==filtroTipo)return false;

      <div style={{flex:1}} />

    </div>

    {/* Contadores */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>

        ["Proformas",pedidos.filter(function(p){return p.tipo==="proforma";}).length,"#7f77dd"],

        <thead style={{background:"#f9f9f9"}}>

        <tbody>{pedidosFilt.map(function(p){

            <td style={{padding:"9px 10px"}}><Badge color={p.tipo==="proforma"?"#7f77dd":"#378add"} label={p.tipo==="proforma"?"Proforma":"Pedido"} /></td>
            <td style={{padding:"9px 10px",fontWeight:500}}>{cliente?cliente.nombre:p.cliente_id}</td>
            <td style={{padding:"9px 10px",fontSize:12}}>{p.fecha}</td>

    {/* Bitácora de PDFs */}

        <thead style={{background:"#f9f9f9"}}>
          <tr>{["Número","Tipo","Cliente","Generado por","Fecha y hora"].map(function(h){return <th key={h} style={{padding:"7px 10px",textAlign:"left",fontWeight:600,color:"#555",fontSize:11,borderBottom:"1px solid #eee"}}>{h}</th>;})}</tr>
        </thead>
        <tbody>{pdfLog.map(function(r){

            <td style={{padding:"6px 10px",fontSize:11,color:"#888"}}>{r.created_at?new Date(r.created_at).toLocaleString("es-ES"):"—"}</td>
          </tr>;

      </table>
      {!pdfLog.length&&<div style={{textAlign:"center",color:"#aaa",padding:"1.5rem",fontSize:12}}>Sin PDFs generados todavía.</div>}
    </div>
  </div>;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function CRM() {
  var sesion=null;
  try{var s=sessionStorage.getItem("crm_session");if(s)sesion=JSON.parse(s);}catch(e){}

  var [currentUser,setCurrentUser]=useState(sesion);
  var [lineaActiva,setLineaActiva]=useState(sesion?sesion.lineaActiva:"La Sin Gluten");
  var [tab,setTab]=useState("Dashboard");
  var [config,setConfigState]=useState({canales:[],grupos:[],gestores:[]});
  var [clients,setClients]=useState([]);
  var [activities,setActivities]=useState([]);
  var [ventas,setVentas]=useState([]);
  var [loading,setLoading]=useState(true);
  var [error,setError]=useState(null);
  var [saving,setSaving]=useState(false);
  var [clientPanel,setClientPanel]=useState(null);
  var [detalleId,setDetalleId]=useState(null);
  var [actPanel,setActPanel]=useState(null);
  var [showImportCli,setShowImportCli]=useState(false);
  var [showImportVen,setShowImportVen]=useState(false);
  var [busqueda,setBusqueda]=useState("");
  var [pagina,setPagina]=useState(1);
  var [filter,setFilter]=useState({canal:"",grupo:"",gestor:"",tipo_cliente:""});
  var [actFiltro,setActFiltro]=useState({gestor:"",estado:"",tipo:""});
  var [dashGestor,setDashGestor]=useState("");
  var [ventasFiltro,setVentasFiltro]=useState({canal:"",gestor:"",grupo:"",mes:"",anio:String(CY),groupBy:"mes"});
  var [newVal,setNewVal]=useState({canal:"",grupo:"",gestor:""});

  function clientName(id){var c=clients.find(function(x){return x.id===id;});return c?c.nombre:"—";}

  var clientsFiltLinea=useMemo(function(){return clients.filter(function(c){return c.linea_negocio===lineaActiva;});},[clients,lineaActiva]);
  var activitiesFiltLinea=useMemo(function(){return activities.filter(function(a){return a.linea_negocio===lineaActiva;});},[activities,lineaActiva]);
  var ventasFiltLinea=useMemo(function(){return ventas.filter(function(v){return v.linea_negocio===lineaActiva;});},[ventas,lineaActiva]);

  var loadAll=useCallback(function(){
    setLoading(true);setError(null);
    Promise.all([
      sbGet("config","select=clave,valor"),
      sbGet("clientes","select=*&order=nombre.asc"),
      sbGet("actividades","select=*&order=fecha.desc"),
      sbGet("ventas","select=*&order=anio.desc,mes.desc"),
    ]).then(function(results){
      var cfgRows=results[0],cls=results[1],acts=results[2],vts=results[3];
      var cfg={canales:[],grupos:[],gestores:[]};
      cfgRows.forEach(function(r){if(r.clave==="canales")cfg.canales=r.valor;if(r.clave==="grupos")cfg.grupos=r.valor;if(r.clave==="gestores")cfg.gestores=r.valor;});
      setConfigState(cfg);setClients(cls);setActivities(acts);setVentas(vts);setLoading(false);
    }).catch(function(e){setError("No se pudo conectar. "+e.message);setLoading(false);});
  },[]);

  useEffect(function(){if(currentUser)loadAll();},[currentUser]);
  useEffect(function(){
    if(currentUser&&config.gestores.length){
      if(config.gestores.indexOf(currentUser.nombre)>=0){
        setDashGestor(currentUser.nombre);
        setActFiltro(function(f){return Object.assign({},f,{gestor:currentUser.nombre});});
        setVentasFiltro(function(f){return Object.assign({},f,{gestor:currentUser.nombre});});
      }
    }
  },[currentUser,config.gestores.length]);

  function handleLogin(u){sessionStorage.setItem("crm_session",JSON.stringify(u));setCurrentUser(u);setLineaActiva(u.lineaActiva);}
  function handleLogout(){sessionStorage.removeItem("crm_session");setCurrentUser(null);}
  function cambiarLinea(l){
    setLineaActiva(l);
    var u=Object.assign({},currentUser,{lineaActiva:l});
    setCurrentUser(u);sessionStorage.setItem("crm_session",JSON.stringify(u));
    setDetalleId(null);setClientPanel(null);setActPanel(null);setBusqueda("");setPagina(1);
  }

  function saveConfig(key,arr){
    return sbGet("config","clave=eq."+key+"&select=id").then(function(rows){
      if(rows.length)return sbPatch("config",rows[0].id,{valor:arr});
      else return sbPost("config",{clave:key,valor:arr});
    }).then(function(){setConfigState(function(prev){return Object.assign({},prev,{[key]:arr});});});
  }

  // FIX: saveClient migra actividades si cambia línea de negocio
  function saveClient(form,contactos){
    setSaving(true);
    var lineaAnterior=null;
    if(form.id){
      var clienteAnterior=clients.find(function(c){return c.id===form.id;});
      if(clienteAnterior)lineaAnterior=clienteAnterior.linea_negocio;
    }
    var body={nombre:form.nombre,nif:form.nif||null,calle:form.calle||null,numero:form.numero||null,cp:form.cp||null,ciudad:form.ciudad||null,pais:form.pais||"España",telefono:form.telefono||null,email:form.email||null,contacto:form.contacto||null,canal:form.canal||null,grupo:form.grupo||null,gestor:form.gestor||null,tipo_cliente:form.tipo_cliente||"Potencial",comentarios:form.comentarios||null,linea_negocio:form.linea_negocio||lineaActiva};
    var p;
    if(form.id){
      p=sbPatch("clientes",form.id,body).then(function(){
        // Si cambió la línea, migrar actividades del cliente a la nueva línea
        if(lineaAnterior&&lineaAnterior!==body.linea_negocio){
          return fetch(SB_URL+"/rest/v1/actividades?cliente_id=eq."+form.id,{
            method:"PATCH",
            headers:HDR,
            body:JSON.stringify({linea_negocio:body.linea_negocio})
          });
        }
      });
    } else {
      var allCodes=clients.map(function(c){return c.codigo;}).filter(Boolean);
      var maxNum=allCodes.length?Math.max.apply(null,allCodes.map(function(c){return parseInt(c.replace("CL",""))||0;})):0;
      body.codigo="CL"+String(maxNum+1).padStart(6,"0");
      p=sbPost("clientes",body);
    }
    p.then(function(saved){
      var clienteId=form.id||(Array.isArray(saved)?saved[0].id:saved.id);
      return sbDelWhere("contactos","cliente_id=eq."+clienteId).then(function(){
        var validos=(contactos||[]).filter(function(c){return (c.nombre||"").trim();});
        if(!validos.length)return;
        var idx=0;
        function nextC(){
          if(idx>=validos.length)return;
          var c=validos[idx++];
          sbPost("contactos",{cliente_id:clienteId,nombre:c.nombre,telefono:c.telefono||null,email:c.email||null,sector:c.sector||null}).then(nextC).catch(nextC);
        }
        nextC();
      });
    }).then(function(){return loadAll();}).then(function(){setClientPanel(null);setSaving(false);}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }

  function deleteClient(id){
    if(!confirm("¿Eliminar este cliente?"))return;
    sbDel("clientes",id).then(function(){return loadAll();}).then(function(){setDetalleId(null);}).catch(function(e){alert("Error: "+e.message);});
  }

  function saveActivity(form){
    setSaving(true);
    var body={cliente_id:form.clienteId,tipo:form.tipo,titulo:form.titulo||"",nota:form.nota,fecha:form.fecha,gestor:form.gestor,estado:form.estado||"Pendiente",prioridad:form.prioridad||"Media",linea_negocio:form.linea_negocio||lineaActiva};
    var p=form.id?sbPatch("actividades",form.id,body):sbPost("actividades",body);
    p.then(function(){return loadAll();}).then(function(){setActPanel(null);setSaving(false);}).catch(function(e){alert("Error: "+e.message);setSaving(false);});
  }
  function deleteActivity(id){
    sbDel("actividades",id).then(function(){setActivities(function(prev){return prev.filter(function(a){return a.id!==id;});});}).catch(function(e){alert("Error: "+e.message);});
  }

  var filteredClients=useMemo(function(){
    var q=norm(busqueda);
    return clientsFiltLinea.filter(function(c){
      if(filter.canal&&c.canal!==filter.canal)return false;
      if(filter.grupo&&c.grupo!==filter.grupo)return false;
      if(filter.gestor&&c.gestor!==filter.gestor)return false;
      if(filter.tipo_cliente&&c.tipo_cliente!==filter.tipo_cliente)return false;
      if(q){return norm(c.nombre).indexOf(q)>=0||norm(c.nif||"").indexOf(q)>=0||norm(c.ciudad||"").indexOf(q)>=0||norm(c.gestor||"").indexOf(q)>=0||norm(c.contacto||"").indexOf(q)>=0||norm(c.codigo||"").indexOf(q)>=0;}
      return true;
    });
  },[clientsFiltLinea,filter,busqueda]);

  useEffect(function(){setPagina(1);},[busqueda,filter,lineaActiva]);

  var totalFiltrados=filteredClients.length;
  var clientesPagina=filteredClients.slice((pagina-1)*POR_PAGINA,pagina*POR_PAGINA);

  var ventasFilt=useMemo(function(){return ventasFiltLinea.filter(function(v){
    var cliente=clients.find(function(c){return c.id===v.cliente_id;});
    if(ventasFiltro.canal&&(!cliente||cliente.canal!==ventasFiltro.canal))return false;
    if(ventasFiltro.grupo&&(!cliente||cliente.grupo!==ventasFiltro.grupo))return false;
    if(ventasFiltro.gestor&&v.gestor!==ventasFiltro.gestor)return false;
    if(ventasFiltro.mes&&String(v.mes)!==ventasFiltro.mes)return false;
    if(ventasFiltro.anio&&String(v.anio)!==ventasFiltro.anio)return false;
    return true;

        })}
        <Btn onClick={function(){setRptFilter({canal:"",grupo:"",gestor:"",fechaDesde:"",fechaHasta:"",estado:""});}}>Limpiar</Btn>
        <Btn variant="success" onClick={function(){dlCSV(toCSV(rows,[{key:"codigo",label:"Código"},{key:"nombre",label:"Empresa"},{key:"tipo_cliente",label:"Tipo"},{key:"canal",label:"Canal"},{key:"grupo",label:"Grupo"},{key:"gestor",label:"Gestor"},{key:"numActs",label:"Actividades"},{key:"actsPend",label:"Pendientes"},{key:"ultima",label:"Última activ."},{key:"ventaTotal",label:"Venta Total €"}]),"informe.csv");}}>⬇ CSV</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {[["Clientes",rows.length,"#185fa5"],["Actividades",rows.reduce(function(s,r){return s+r.numActs;},0),"#1d9e75"],["Pendientes",rows.reduce(function(s,r){return s+r.actsPend;},0),"#ba7517"],["Venta Total","€"+rows.reduce(function(s,r){return s+r.ventaTotal;},0).toLocaleString("es-ES",{minimumFractionDigits:2}),"#7f77dd"]].map(function(item){
          var l=item[0],v=item[1],c=item[2];
          return <div key={l} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:8,padding:"0.75rem 1rem"}}><div style={{fontSize:11,color:"#888",marginBottom:2}}>{l}</div><div style={{fontSize:typeof v==="string"&&v.indexOf("€")>=0?15:22,fontWeight:600,color:c}}>{v}</div></div>;
        })}
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,background:"#fff",borderRadius:10}}>
          <thead style={{background:"#f9f9f9"}}><tr>{["Código","Empresa","Tipo","Canal","Gestor","Actividades","Pendientes","Última activ.","Venta Total"].map(function(h){return <th key={h} style={{textAlign:"left",padding:"8px 10px",fontWeight:600,color:"#555",fontSize:12,borderBottom:"1px solid #eee",whiteSpace:"nowrap"}}>{h}</th>;})}</tr></thead>
          <tbody>{rows.map(function(r){
            return <tr key={r.id} style={{borderBottom:"1px solid #f0f0f0"}}>
              <td style={{padding:"9px 10px",fontSize:11,fontFamily:"monospace",color:linColor,fontWeight:600}}>{r.codigo||"—"}</td>
              <td style={{padding:"9px 10px",fontWeight:500}}>{r.nombre}</td>
              <td style={{padding:"9px 10px"}}><Badge color={TCLI_C[r.tipo_cliente]||"#888"} label={r.tipo_cliente||"Potencial"} /></td>
              <td style={{padding:"9px 10px"}}><Badge color="#7f77dd" label={r.canal||"—"} /></td>
              <td style={{padding:"9px 10px",fontSize:12}}>{r.gestor}</td>
              <td style={{padding:"9px 10px",textAlign:"center",color:r.numActs>0?"#1d9e75":"#aaa",fontWeight:600}}>{r.numActs}</td>
              <td style={{padding:"9px 10px",textAlign:"center",color:r.actsPend>0?"#ba7517":"#aaa",fontWeight:600}}>{r.actsPend}</td>
              <td style={{padding:"9px 10px",fontSize:12}}>{r.ultima}</td>
              <td style={{padding:"9px 10px",textAlign:"right",fontWeight:600,color:"#1d9e75"}}>€{r.ventaTotal.toLocaleString("es-ES",{minimumFractionDigits:2})}</td>
            </tr>;
          })}</tbody>
        </table>
        {rows.length===0&&<div style={{textAlign:"center",color:"#aaa",marginTop:24,fontSize:13}}>Sin resultados.</div>}
      </div>
    </div>;
  }

  function TabConfiguracion(){
    var sections=[["Canales","canal","canales","#7f77dd"],["Grupos gestores","grupo","grupos","#1d9e75"],["Gestores","gestor","gestores","#378add"]];
    return <div>
      {currentUser.admin&&<div><AdminPanel /><NotifConfig activities={activities} clients={clients} currentUser={currentUser} /><Sep label="Listas de configuración" /></div>}
      {sections.map(function(item){
        var label=item[0],ckey=item[1],k=item[2],color=item[3];
        return <div key={ckey} style={{marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{label}</div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <Inp value={newVal[ckey]} onChange={function(v){setNewVal(function(n){return Object.assign({},n,{[ckey]:v});});}} placeholder="Nuevo..." />
            <Btn variant="primary" onClick={function(){var v=(newVal[ckey]||"").trim();if(!v||config[k].indexOf(v)>=0)return;saveConfig(k,config[k].concat([v])).then(function(){setNewVal(function(n){return Object.assign({},n,{[ckey]:""});});});}}>Añadir</Btn>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {config[k].map(function(v){
              return <span key={v} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:16,background:color+"18",border:"1px solid "+color+"44",fontSize:13}}>
                <span style={{color:color}}>{v}</span>
                <button onClick={function(){saveConfig(k,config[k].filter(function(x){return x!==v;}));}} style={{background:"none",border:"none",cursor:"pointer",color:color,fontSize:16,lineHeight:1,padding:0}}>×</button>
              </span>;
            })}
          </div>
        </div>;
      })}
      <Sep label="📦 Productos y listas de precio" />
      <ProductosManager linColor={linColor} lineaActiva={lineaActiva} currentUser={currentUser} />
    </div>;
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.5rem",padding:"1rem 1.25rem",borderRadius:12,background:linGrad}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(255,255,255,0.6)",flexShrink:0}}>
            <img src={linLogo} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center"}} />
          </div>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:"#fff",textShadow:"0 1px 2px rgba(0,0,0,0.15)"}}>CRM — {lineaActiva}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.85)",marginTop:2}}>Gestión de clientes B2B</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {currentUser.lineas&&currentUser.lineas.length>1&&(
            <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"3px"}}>
              {currentUser.lineas.map(function(l){
                return <button key={l} onClick={function(){cambiarLinea(l);}}
                  style={{padding:"4px 12px",borderRadius:16,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:lineaActiva===l?"#fff":"transparent",color:lineaActiva===l?linColor:"rgba(255,255,255,0.8)",transition:"all 0.2s"}}>
                  {l}
                </button>;
              })}
            </div>
          )}
          <div style={{fontSize:12,color:"rgba(255,255,255,0.9)",background:"rgba(255,255,255,0.15)",padding:"4px 12px",borderRadius:20}}>👤 {currentUser.nombre}{currentUser.admin?" ⭐":""}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.2)",padding:"5px 12px",borderRadius:20}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:loading?"#ffd700":error?"#ff6b6b":"#90ee90"}} />
            <span style={{fontSize:12,color:"#fff"}}>{loading?"Conectando…":error?"Sin conexión":"Conectado"}</span>
          </div>
          <Btn onClick={handleLogout} style={{fontSize:12,padding:"5px 12px",background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff"}}>Salir</Btn>
        </div>
      </div>
      <div style={{display:"flex",gap:2,marginBottom:24,borderBottom:"1px solid #e8e8e8",overflowX:"auto"}}>
        {TABS.map(function(t){return <button key={t} onClick={function(){setTab(t);}} style={{padding:"8px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:tab===t?600:400,color:tab===t?linColor:"#666",borderBottom:tab===t?"2px solid "+linColor:"2px solid transparent",marginBottom:-1,whiteSpace:"nowrap"}}>{t}</button>;})}
      </div>
      {loading?<Spinner/>:error?<ErrMsg msg={error} onRetry={loadAll}/>:<div>
        {tab==="Dashboard"     &&<Dashboard />}
        {tab==="Clientes"      &&<TabClientes />}
        {tab==="Actividades"   &&<TabActividades />}
        {tab==="Ventas"        &&<TabVentas />}
        {tab==="Pedidos"       &&<TabPedidos clients={clients} config={config} currentUser={currentUser} lineaActiva={lineaActiva} linColor={linColor} />}
        {tab==="Informes"      &&<TabInformes />}
        {tab==="Configuración" &&<TabConfiguracion />}
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CRM />);
</script>
</body>
</html>
